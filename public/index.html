<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BLOOM — משחק מיזוג</title>
<meta property="og:title" content="BLOOM — משחק מיזוג">
<meta property="og:description" content="מזג, התקדם, הגע לכתר. שחק עכשיו.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #F5F5F0;
    color: #1C1A18;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .app {
    width: 100%;
    max-width: 380px;
    background: #FFFFFF;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 2px 30px rgba(0,0,0,0.06);
    position: relative;
  }
  .top {
    padding: 14px 14px 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .brand { font-size: 16px; letter-spacing: 0.2em; font-weight: 600; color: #1C1A18; }
  .stats { display: flex; gap: 14px; align-items: center; }
  .stat-label { font-size: 10px; color: #6F6E68; letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-val { font-size: 16px; font-weight: 600; color: #1C1A18; margin-top: 1px; display: inline-block; }
  .stat-val.bump { animation: bump 0.32s ease-out; }
  @keyframes bump {
    0% { transform: scale(1); color: #1C1A18; }
    40% { transform: scale(1.22); color: #BA7517; }
    100% { transform: scale(1); color: #1C1A18; }
  }
  .top-buttons { display: flex; gap: 5px; }
  .icon-btn {
    background: none; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .icon-btn svg { width: 16px; height: 16px; color: #6F6E68; }
  .icon-btn:hover { background: #F5F5F0; }
  .icon-btn.muted svg { color: #C84040; }
  .next-bar {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    position: relative;
  }
  .next-label { font-size: 12px; color: #6F6E68; }
  .next-piece {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .next-piece svg { width: 24px; height: 24px; }
  .next-value { flex: 1; font-size: 11px; color: #A8A6A0; text-align: left; }
  .grid-wrap { padding: 12px; direction: ltr; position: relative; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .cell {
    aspect-ratio: 1; background: #F5F2EC; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.12s;
    position: relative;
  }
  .cell:hover { background: #EFEBE2; }
  .cell.filled svg { width: 30px; height: 30px; }
  .cell.appearing { animation: pop 0.22s ease-out; }
  .cell.merging { animation: merge 0.24s ease-out; }
  .cell.demo-glow { box-shadow: 0 0 0 3px rgba(250,199,117,0.7); animation: demoPulse 1s ease-in-out infinite; }
  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes merge { 0% { transform: scale(1); } 50% { transform: scale(1.28); } 100% { transform: scale(1); } }
  @keyframes demoPulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(250,199,117,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(250,199,117,0.9); }
  }

  .float-score {
    position: absolute;
    background: #1C1A18;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 12px;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translate(-50%, 10%) scale(0.6); }
    18%  { opacity: 1; transform: translate(-50%, -30%) scale(1.08); }
    100% { opacity: 0; transform: translate(-50%, -130%) scale(1); }
  }
  .chain-badge {
    position: absolute;
    top: 50%; left: 50%;
    background: #EF9F27;
    color: #412402;
    font-weight: 800;
    font-size: 20px;
    padding: 10px 22px;
    border-radius: 24px;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 25;
    white-space: nowrap;
    animation: chainPop 0.75s ease-out forwards;
  }
  @keyframes chainPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.55) rotate(-6deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.18) rotate(-2deg); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -75%) scale(0.95) rotate(0); }
  }

  .overlay { padding: 20px 22px 22px; text-align: center; direction: rtl; }
  .over-title { font-size: 14px; font-weight: 500; color: #6F6E68; letter-spacing: 0.06em; }
  .over-score { font-size: 44px; font-weight: 600; color: #1C1A18; margin-top: 6px; line-height: 1; }
  .over-sub { font-size: 13px; color: #6F6E68; margin-top: 6px; }
  .tier-table { display: flex; flex-direction: column; gap: 4px; margin: 16px 0 4px; }
  .tier-row { display: flex; align-items: center; gap: 10px; padding: 5px 8px; border-radius: 7px; }
  .tier-row.reached { background: #FAFAF6; }
  .tier-row.locked { opacity: 0.4; }
  .tier-icon-sm { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tier-icon-sm svg { width: 14px; height: 14px; }
  .tier-name { flex: 1; font-size: 13px; color: #1C1A18; text-align: right; }
  .tier-pts { font-size: 12px; color: #6F6E68; font-variant-numeric: tabular-nums; }

  .share-label { font-size: 10px; color: #A8A6A0; margin: 14px 0 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .share-card {
    padding: 12px 14px; background: #DCF8C6; border-radius: 10px;
    direction: ltr; text-align: left;
    font-size: 13px; line-height: 1.8; color: #1B5E20;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .btn {
    width: 100%; padding: 13px; border-radius: 10px;
    background: #1C1A18; color: #FFFFFF;
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 14px;
  }
  .btn.secondary { background: #F5F2EC; color: #1C1A18; margin-top: 8px; }
  .btn:active { transform: scale(0.98); }

  .info-modal {
    position: absolute; inset: 0;
    background: rgba(28,26,24,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .info-card {
    background: #FFFFFF; border-radius: 16px; padding: 18px 18px 16px;
    width: 100%; max-width: 320px;
    position: relative;
    max-height: 90%;
    overflow-y: auto;
  }
  .info-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .info-sub { font-size: 12px; color: #6F6E68; margin-bottom: 12px; }
  .info-close { position: absolute; top: 12px; left: 12px; background: none; border: none; cursor: pointer; padding: 4px; }
  .info-close svg { width: 18px; height: 18px; color: #6F6E68; }
  .credits {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-size: 10px;
    color: #A8A6A0;
    line-height: 1.5;
    direction: rtl;
    text-align: right;
  }
  .credits a { color: #6F6E68; }

  .resume-tag {
    display: inline-block;
    background: #E1F5EE;
    color: #04342C;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: 6px;
    letter-spacing: 0.05em;
    font-weight: 600;
    vertical-align: middle;
  }

  /* TUTORIAL */
  .tut-overlay {
    position: absolute; inset: 0; z-index: 200;
    pointer-events: none;
  }
  .tut-dim {
    position: absolute; inset: 0;
    background: rgba(28,26,24,0.55);
    pointer-events: auto;
    transition: opacity 0.3s;
  }
  .tut-spotlight {
    position: absolute;
    border: 3px solid #FAC775;
    border-radius: 12px;
    pointer-events: none;
    transition: all 0.35s ease;
    box-shadow: 0 0 0 9999px rgba(28,26,24,0.55);
    z-index: 201;
  }
  .tut-arrow {
    position: absolute;
    z-index: 202;
    pointer-events: none;
    animation: arrowBounce 1s ease-in-out infinite;
  }
  .tut-arrow svg { width: 38px; height: 38px; color: #FAC775; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  @keyframes arrowBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  .tut-card {
    position: absolute;
    left: 14px; right: 14px;
    background: #FFFFFF;
    border-radius: 14px;
    padding: 16px 18px 14px;
    z-index: 203;
    pointer-events: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    direction: rtl;
    text-align: right;
  }
  .tut-card.top { top: 12px; }
  .tut-card.bottom { bottom: 12px; }
  .tut-step {
    font-size: 10px;
    color: #BA7517;
    letter-spacing: 0.15em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .tut-title {
    font-size: 16px;
    font-weight: 700;
    color: #1C1A18;
    margin-bottom: 6px;
  }
  .tut-body {
    font-size: 13px;
    line-height: 1.5;
    color: #4A4845;
    margin-bottom: 12px;
  }
  .tut-body b { color: #1C1A18; }
  .tut-buttons {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .tut-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    background: #1C1A18;
    color: #FFFFFF;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .tut-btn.ghost {
    background: transparent;
    color: #A8A6A0;
    flex: 0 0 auto;
    padding: 10px 12px;
  }
  .tut-btn:active { transform: scale(0.97); }
  .tut-progress {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .tut-dot {
    width: 22px; height: 4px;
    background: #E5E2DA;
    border-radius: 2px;
  }
  .tut-dot.active { background: #FAC775; }
  .tut-dot.done { background: #1C1A18; }

  /* Demo subtitle within board */
  .demo-caption {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    background: rgba(28,26,24,0.9);
    color: #FFFFFF;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 12px;
    z-index: 26;
    white-space: nowrap;
    letter-spacing: 0.03em;
    direction: rtl;
  }

  .tut-welcome {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #F5F5F0 0%, #FFFFFF 100%);
    z-index: 205;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    direction: rtl;
    text-align: center;
  }
  .tut-welcome-icons {
    display: flex;
    gap: 6px;
    margin-bottom: 22px;
    align-items: center;
  }
  .tut-welcome-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    animation: welcomeFloat 2s ease-in-out infinite;
  }
  .tut-welcome-icon svg { width: 24px; height: 24px; }
  .tut-welcome-icon:nth-child(2) { animation-delay: 0.15s; }
  .tut-welcome-icon:nth-child(3) { animation-delay: 0.30s; }
  .tut-welcome-icon:nth-child(4) { animation-delay: 0.45s; }
  .tut-welcome-icon:nth-child(5) { animation-delay: 0.60s; }
  @keyframes welcomeFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .tut-welcome-brand {
    font-size: 32px;
    letter-spacing: 0.25em;
    font-weight: 700;
    color: #1C1A18;
    margin-bottom: 8px;
  }
  .tut-welcome-sub {
    font-size: 14px;
    color: #6F6E68;
    margin-bottom: 32px;
    max-width: 280px;
    line-height: 1.5;
  }
  .tut-welcome-btn {
    width: 100%;
    max-width: 240px;
    padding: 14px;
    border-radius: 10px;
    background: #1C1A18;
    color: #FFFFFF;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .tut-welcome-skip {
    margin-top: 14px;
    background: none;
    border: none;
    color: #A8A6A0;
    font-size: 13px;
    cursor: pointer;
    padding: 8px;
    font-family: inherit;
  }

  /* TIER LADDER (full path animation) */
  .ladder-screen {
    position: absolute; inset: 0;
    background: #FFFFFF;
    z-index: 210;
    padding: 22px 18px;
    direction: rtl;
    overflow-y: auto;
  }
  .ladder-title {
    font-size: 16px;
    font-weight: 700;
    color: #1C1A18;
    text-align: center;
    margin-bottom: 4px;
  }
  .ladder-sub {
    font-size: 12px;
    color: #6F6E68;
    text-align: center;
    margin-bottom: 18px;
  }
  .ladder-stairs {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .ladder-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px;
    border-radius: 10px;
    background: #FAFAF6;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s, transform 0.35s;
  }
  .ladder-row.shown { opacity: 1; transform: translateY(0); }
  .ladder-row.current { background: #FFF5E1; box-shadow: 0 0 0 2px #FAC775; }
  .ladder-pair {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .ladder-piece {
    width: 30px; height: 30px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .ladder-piece svg { width: 18px; height: 18px; }
  .ladder-plus, .ladder-arrow {
    font-size: 13px;
    font-weight: 700;
    color: #A8A6A0;
  }
  .ladder-result-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ladder-result {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .ladder-result svg { width: 22px; height: 22px; }
  .ladder-text {
    font-size: 13px;
    color: #1C1A18;
    font-weight: 600;
  }
  .ladder-row.current .ladder-result { animation: ladderBeat 0.6s ease-in-out infinite; }
  @keyframes ladderBeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .ladder-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: #1C1A18;
    color: #FFFFFF;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>

<audio id="bg-music" src="bloom-music.mp3" loop preload="auto"></audio>

<div class="app">
  <div class="top">
    <div class="brand">BLOOM</div>
    <div class="stats">
      <div><div class="stat-label">ניקוד</div><div class="stat-val" id="score">0</div></div>
      <div><div class="stat-label">שיא</div><div class="stat-val" id="best">0</div></div>
    </div>
    <div class="top-buttons">
      <button class="icon-btn" id="mute" aria-label="השתק">
        <svg id="mute-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 8a5 5 0 0 1 0 8M17.7 5a9 9 0 0 1 0 14M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15"/></svg>
      </button>
      <button class="icon-btn" id="info" aria-label="מידע על ניקוד">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      </button>
      <button class="icon-btn" id="reset" aria-label="התחל מחדש">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4"/></svg>
      </button>
    </div>
  </div>
  <div class="next-bar">
    <div class="next-label">הבא:</div>
    <div class="next-piece" id="next-piece"></div>
    <div class="next-value" id="next-value"></div>
  </div>
  <div class="grid-wrap" id="grid-wrap"><div class="grid" id="grid"></div></div>
</div>

<script>
(function() {
  const ROWS = 6, COLS = 4;

  const SVG = {
    circle:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/></svg>',
    leaf:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21c.5-4.5 2.5-8 7-10"/><path d="M9 18c6.218 0 10.5-3.288 11-12v-2h-4.014c-9 0-11.986 4-12 9c0 1 0 3 2 5h3z"/></svg>',
    flower:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><circle cx="12" cy="5.5" r="3"/><circle cx="12" cy="18.5" r="3"/><circle cx="5.5" cy="12" r="3"/><circle cx="18.5" cy="12" r="3"/></svg>',
    flame:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a5 5 0 0 0 10 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-2 2z"/></svg>',
    bolt:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3v7h6l-8 11v-7H5l8-11z"/></svg>',
    star:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17.75l-6.172 3.245 1.179-6.873-4.993-4.867 6.9-1.002L12 1.999l3.086 6.254 6.9 1.002-4.993 4.867 1.179 6.873z"/></svg>',
    diamond: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5h12l3 5-9 11-9-11z"/><path d="M3 10h18M9 5l3 5-3 5M15 5l-3 5 3 5"/></svg>',
    crown:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l3.5 9h11l3.5-9-5 4-4-7-4 7z"/></svg>',
    arrowDown: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2v15M5 12l7 8 7-8" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'
  };

  const TIERS = [
    null,
    { svg: SVG.circle,  bg: '#D3D1C7', fg: '#2C2C2A', name: 'אבן',    emoji: '⬜' },
    { svg: SVG.leaf,    bg: '#C0DD97', fg: '#173404', name: 'עלה',    emoji: '🟩' },
    { svg: SVG.flower,  bg: '#F4C0D1', fg: '#4B1528', name: 'פרח',    emoji: '🟧' },
    { svg: SVG.flame,   bg: '#F5C4B3', fg: '#4A1B0C', name: 'אש',     emoji: '🟥' },
    { svg: SVG.bolt,    bg: '#FAC775', fg: '#412402', name: 'ברק',    emoji: '🟨' },
    { svg: SVG.star,    bg: '#9FE1CB', fg: '#04342C', name: 'כוכב',   emoji: '🟦' },
    { svg: SVG.diamond, bg: '#B5D4F4', fg: '#042C53', name: 'יהלום',  emoji: '💎' },
    { svg: SVG.crown,   bg: '#CECBF6', fg: '#26215C', name: 'כתר',    emoji: '👑' }
  ];
  const MAX_TIER = TIERS.length - 1;
  const WEIGHTS = [0, 55, 28, 12, 5];
  const BEST_KEY = 'bloom_best_score';
  const STATE_KEY = 'bloom_game_state';
  const MUTE_KEY = 'bloom_muted';
  const TUTORIAL_KEY = 'bloom_tutorial_done';
  const MUSIC_VOLUME = 0.28;
  const TOTAL_STEPS = 6;

  function pointsFor(tier, groupSize, chainMult) {
    return Math.round(tier * 10 * groupSize * chainMult);
  }
  function pieceValue(tier) { return pointsFor(tier, 2, 1); }

  /* ============ AUDIO ============ */
  let audioCtx = null;
  let muted = localStorage.getItem(MUTE_KEY) === '1';
  const bgMusic = document.getElementById('bg-music');
  if (bgMusic) bgMusic.volume = MUSIC_VOLUME;

  function ensureAudio() {
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function() {});
    return audioCtx;
  }
  function startMusic() {
    if (muted || !bgMusic) return;
    const p = bgMusic.play();
    if (p && p.catch) p.catch(function() {});
  }
  function stopMusic() { if (bgMusic) try { bgMusic.pause(); } catch(e) {} }
  function playTone(freq, duration, type, volume, delay) {
    if (muted) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    const startAt = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, startAt);
    gain.gain.setValueAtTime(0, startAt);
    gain.gain.linearRampToValueAtTime(volume || 0.15, startAt + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(startAt); osc.stop(startAt + duration + 0.02);
  }
  function soundDrop() { playTone(180, 0.08, 'sine', 0.08, 0); }
  function soundMerge(tier) {
    const base = 280 + tier * 40;
    playTone(base, 0.09, 'triangle', 0.12, 0);
    playTone(base * 1.5, 0.11, 'triangle', 0.09, 0.04);
  }
  function soundChain(chainCount) {
    const notes = [392, 494, 587, 698, 880, 988];
    for (let i = 0; i < Math.min(chainCount, notes.length); i++)
      playTone(notes[i], 0.13, 'square', 0.08, i * 0.05);
  }
  function soundMilestone(tier) {
    const melody = [523, 659, 784, 1047];
    for (let i = 0; i < melody.length; i++) playTone(melody[i], 0.18, 'triangle', 0.13, i * 0.08);
    if (tier >= MAX_TIER) for (let i = 0; i < melody.length; i++) playTone(melody[i] * 1.5, 0.22, 'triangle', 0.1, 0.4 + i * 0.08);
  }
  function soundGameOver() {
    playTone(330, 0.15, 'sawtooth', 0.1, 0);
    playTone(247, 0.18, 'sawtooth', 0.1, 0.12);
    playTone(196, 0.32, 'sawtooth', 0.1, 0.28);
  }
  function buzz(pattern) {
    if (muted) return;
    if (navigator.vibrate) try { navigator.vibrate(pattern); } catch(e) {}
  }

  /* ============ STATE ============ */
  let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
  let grid, score, nextPiece, busy, highestTier;
  let resumedThisSession = false;
  let tutorialActive = false;
  let tutorialStep = 0;
  let tutorialOnDrop = null;

  function saveState() {
    if (tutorialActive) return;
    try {
      if (!grid || isGameOver()) { localStorage.removeItem(STATE_KEY); return; }
      const isEmpty = grid.every(function(row) { return row.every(function(c) { return c === 0; }); });
      if (isEmpty && score === 0) { localStorage.removeItem(STATE_KEY); return; }
      const state = { grid: grid, score: score, nextPiece: nextPiece, highestTier: highestTier, v: 2 };
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    } catch(e) {}
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !s.grid || s.grid.length !== ROWS) return null;
      for (let i = 0; i < ROWS; i++) if (!s.grid[i] || s.grid[i].length !== COLS) return null;
      return s;
    } catch(e) { return null; }
  }
  function clearState() { try { localStorage.removeItem(STATE_KEY); } catch(e) {} }

  function init(fresh) {
    const saved = !fresh ? loadState() : null;
    if (saved) {
      grid = saved.grid; score = saved.score; nextPiece = saved.nextPiece; highestTier = saved.highestTier;
      resumedThisSession = true;
    } else {
      grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
      score = 0; highestTier = 1; nextPiece = pickPiece(); resumedThisSession = false;
      clearState();
    }
    busy = false;
    render();
  }

  function pickPiece() {
    const total = WEIGHTS.reduce(function(a,b) { return a+b; }, 0);
    let r = Math.random() * total;
    for (let i = 1; i < WEIGHTS.length; i++) { r -= WEIGHTS[i]; if (r <= 0) return i; }
    return 1;
  }

  function findGroup(sr, sc, tier) {
    const visited = new Set();
    const group = [];
    const stack = [[sr, sc]];
    while (stack.length) {
      const pos = stack.pop();
      const r = pos[0], c = pos[1];
      const k = r * COLS + c;
      if (visited.has(k)) continue;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      if (grid[r][c] !== tier) continue;
      visited.add(k); group.push([r, c]);
      stack.push([r-1,c], [r+1,c], [r,c-1], [r,c+1]);
    }
    return group;
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let w = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== 0) {
          if (r !== w) { grid[w][c] = grid[r][c]; grid[r][c] = 0; }
          w--;
        }
      }
    }
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function showFloatingScore(row, col, points, chainCount) {
    const gridEl = document.getElementById('grid');
    if (!gridEl) return;
    const cellIdx = row * COLS + col;
    const cell = gridEl.children[cellIdx];
    if (!cell) return;
    const cellRect = cell.getBoundingClientRect();
    const wrapRect = document.getElementById('grid-wrap').getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'float-score';
    fl.textContent = '+' + points.toLocaleString();
    if (chainCount >= 3) { fl.style.fontSize = '17px'; fl.style.background = '#EF9F27'; fl.style.color = '#412402'; }
    else if (chainCount >= 2) { fl.style.fontSize = '15px'; }
    fl.style.left = (cellRect.left - wrapRect.left + cellRect.width / 2) + 'px';
    fl.style.top = (cellRect.top - wrapRect.top + cellRect.height / 2) + 'px';
    document.getElementById('grid-wrap').appendChild(fl);
    setTimeout(function() { if (fl.parentNode) fl.parentNode.removeChild(fl); }, 900);
  }

  function showChainBadge(chainCount, multiplier) {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap) return;
    const badge = document.createElement('div');
    badge.className = 'chain-badge';
    badge.textContent = 'שרשרת ×' + multiplier;
    wrap.appendChild(badge);
    setTimeout(function() { if (badge.parentNode) badge.parentNode.removeChild(badge); }, 750);
  }

  function bumpScore() {
    const el = document.getElementById('score');
    if (!el) return;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  async function processChains() {
    let chainCount = 0;
    let prevHighestTier = highestTier;
    while (true) {
      let merged = null;
      outer: for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = grid[r][c];
          if (t === 0 || t === MAX_TIER) continue;
          const group = findGroup(r, c, t);
          if (group.length >= 2) {
            let kr = -1, kc = -1;
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr > kr || (gr === kr && gc < kc)) { kr = gr; kc = gc; }
            }
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr === kr && gc === kc) continue;
              grid[gr][gc] = 0;
            }
            const nt = Math.min(t + 1, MAX_TIER);
            grid[kr][kc] = nt;
            chainCount++;
            const multiplier = 1 + (chainCount - 1) * 0.5;
            const points = pointsFor(nt, group.length, multiplier);
            score += points;
            if (nt > highestTier) highestTier = nt;
            merged = [kr, kc];
            showFloatingScore(kr, kc, points, chainCount);
            bumpScore();
            soundMerge(nt);
            buzz(chainCount >= 2 ? 25 : 12);
            if (chainCount >= 2) {
              const m = chainCount === 2 ? '1.5' : chainCount === 3 ? '2' : chainCount === 4 ? '2.5' : '3';
              showChainBadge(chainCount, m);
              soundChain(chainCount);
            }
            break outer;
          }
        }
      }
      if (!merged) break;
      render({ merging: merged });
      await sleep(230);
      applyGravity();
      render();
      await sleep(140);
    }
    if (highestTier > prevHighestTier) {
      soundMilestone(highestTier);
      buzz([30, 40, 30]);
    }
  }

  function isGameOver() {
    if (!grid) return false;
    return grid[0].every(function(c) { return c !== 0; });
  }

  async function drop(col) {
    if (busy) return;
    if (tutorialActive && tutorialOnDrop) {
      const allowed = tutorialOnDrop(col);
      if (!allowed) return;
    }
    let row = -1;
    for (let r = ROWS - 1; r >= 0; r--) if (grid[r][col] === 0) { row = r; break; }
    if (row === -1) return;
    busy = true;
    grid[row][col] = nextPiece;
    if (nextPiece > highestTier) highestTier = nextPiece;
    render({ appearing: [row, col] });
    soundDrop();
    await sleep(140);
    await processChains();
    nextPiece = pickPiece();
    if (score > best) { best = score; localStorage.setItem(BEST_KEY, String(best)); }
    if (isGameOver()) {
      soundGameOver(); buzz([60, 80, 100]); clearState(); render({ over: true });
    } else {
      saveState(); busy = false; render();
      if (tutorialActive) tutorialAfterDrop();
    }
  }

  function shareResult() {
    const emojis = [];
    for (let t = 1; t <= highestTier; t++) emojis.push(TIERS[t].emoji);
    const text = 'BLOOM — ' + score.toLocaleString() + ' נקודות\n' + emojis.join('') + '\nשחק: ' + window.location.href;
    if (navigator.share) navigator.share({ text: text }).catch(function() {});
    else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        const btn = document.getElementById('share-btn');
        if (btn) {
          const orig = btn.textContent; btn.textContent = '✓ הועתק ללוח';
          setTimeout(function() { btn.textContent = orig; }, 1600);
        }
      });
    }
  }

  function showInfo() {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap || document.getElementById('info-modal')) return;
    const rows = [];
    for (let t = 1; t <= MAX_TIER; t++) {
      const ti = TIERS[t];
      rows.push(
        '<div class="tier-row reached">' +
          '<div class="tier-icon-sm" style="background:' + ti.bg + ';color:' + ti.fg + '">' + ti.svg + '</div>' +
          '<div class="tier-name">' + ti.name + '</div>' +
          '<div class="tier-pts">' + pieceValue(t).toLocaleString() + ' נק׳ במיזוג זוג</div>' +
        '</div>'
      );
    }
    const modal = document.createElement('div');
    modal.id = 'info-modal';
    modal.className = 'info-modal';
    modal.innerHTML =
      '<div class="info-card">' +
        '<button class="info-close" id="info-close" aria-label="סגור">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
        '</button>' +
        '<div class="info-title">איך הניקוד עובד</div>' +
        '<div class="info-sub">דרגה × 10 × פריטים במיזוג. שרשרת מוסיפה ×1.5, ×2, ×2.5…</div>' +
        '<div class="tier-table">' + rows.join('') + '</div>' +
        '<button class="btn secondary" id="replay-tutorial" style="margin-top:14px;">צפה בסייר שוב</button>' +
        '<div class="credits">' +
          'מוזיקה: Game background Music loop short<br>' +
          '© Manuel Graf, רישיון CC BY 4.0<br>' +
          '<a href="https://manuelgraf.com" target="_blank" rel="noopener">manuelgraf.com</a>' +
        '</div>' +
      '</div>';
    wrap.appendChild(modal);
    document.getElementById('info-close').onclick = function() { modal.remove(); };
    document.getElementById('replay-tutorial').onclick = function() { modal.remove(); startTutorialSteps(); };
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
  }

  function updateMuteUI() {
    const btn = document.getElementById('mute');
    const icon = document.getElementById('mute-icon');
    if (!btn || !icon) return;
    if (muted) {
      btn.classList.add('muted');
      icon.innerHTML = '<path d="M15 8a5 5 0 0 1 1.7 3M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15M21 9l-6 6M15 9l6 6"/>';
    } else {
      btn.classList.remove('muted');
      icon.innerHTML = '<path d="M15 8a5 5 0 0 1 0 8M17.7 5a9 9 0 0 1 0 14M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15"/>';
    }
  }

  function toggleMute() {
    muted = !muted;
    localStorage.setItem(MUTE_KEY, muted ? '1' : '0');
    updateMuteUI();
    if (muted) stopMusic();
    else { ensureAudio(); playTone(523, 0.08, 'sine', 0.12, 0); startMusic(); }
  }

  function render(opts) {
    opts = opts || {};
    document.getElementById('score').textContent = score.toLocaleString();
    document.getElementById('best').textContent = best.toLocaleString();
    const np = document.getElementById('next-piece');
    const npT = TIERS[nextPiece];
    np.style.background = npT.bg;
    np.style.color = npT.fg;
    np.innerHTML = npT.svg;
    const nv = document.getElementById('next-value');
    nv.textContent = pieceValue(nextPiece).toLocaleString() + ' נק׳ במיזוג';
    const wrap = document.getElementById('grid-wrap');

    if (opts.over) {
      const tierRows = [];
      for (let t = 1; t <= MAX_TIER; t++) {
        const ti = TIERS[t];
        const reached = t <= highestTier;
        tierRows.push(
          '<div class="tier-row ' + (reached ? 'reached' : 'locked') + '">' +
            '<div class="tier-icon-sm" style="background:' + ti.bg + ';color:' + ti.fg + '">' + ti.svg + '</div>' +
            '<div class="tier-name">' + ti.name + '</div>' +
            '<div class="tier-pts">' + pieceValue(t).toLocaleString() + ' נק׳</div>' +
          '</div>'
        );
      }
      const emojis = [];
      for (let t = 1; t <= highestTier; t++) emojis.push(TIERS[t].emoji);
      wrap.innerHTML =
        '<div class="overlay">' +
          '<div class="over-title">המשחק נגמר</div>' +
          '<div class="over-score">' + score.toLocaleString() + '</div>' +
          '<div class="over-sub">הגעת ל' + TIERS[highestTier].name + ' · ' + highestTier + '/' + MAX_TIER + ' דרגות</div>' +
          '<div class="tier-table">' + tierRows.join('') + '</div>' +
          '<div class="share-label">התוצאה לשיתוף</div>' +
          '<div class="share-card">BLOOM — ' + score.toLocaleString() + ' pts<br>' + emojis.join('') + '<br><br>' + (window.location.host || 'play.bloom.com') + '</div>' +
          '<button class="btn" id="share-btn">שתף תוצאה</button>' +
          '<button class="btn secondary" id="again">שחק שוב</button>' +
        '</div>';
      document.getElementById('again').onclick = function() { init(true); };
      document.getElementById('share-btn').onclick = shareResult;
      return;
    }

    let gridEl = document.getElementById('grid');
    if (!gridEl) {
      wrap.innerHTML = '<div class="grid" id="grid"></div>';
      gridEl = document.getElementById('grid');
    } else {
      gridEl.innerHTML = '';
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (t > 0) {
          cell.classList.add('filled');
          const ti = TIERS[t];
          cell.style.background = ti.bg;
          cell.style.color = ti.fg;
          cell.innerHTML = ti.svg;
          if (opts.appearing && opts.appearing[0] === r && opts.appearing[1] === c) cell.classList.add('appearing');
          if (opts.merging && opts.merging[0] === r && opts.merging[1] === c) cell.classList.add('merging');
        }
        (function(colIdx) {
          cell.onclick = function() {
            ensureAudio(); startMusic(); drop(colIdx);
          };
        })(c);
        gridEl.appendChild(cell);
      }
    }
  }

  /* ============================================================
     TUTORIAL — 6 STEPS
     ============================================================ */

  function clearTutorialUI() {
    const overlay = document.getElementById('tut-overlay');
    if (overlay) overlay.remove();
    const welcome = document.getElementById('tut-welcome');
    if (welcome) welcome.remove();
    const ladder = document.getElementById('tut-ladder');
    if (ladder) ladder.remove();
    const caption = document.querySelector('.demo-caption');
    if (caption) caption.remove();
  }

  function endTutorial(markDone) {
    tutorialActive = false;
    tutorialStep = 0;
    tutorialOnDrop = null;
    clearTutorialUI();
    if (markDone) localStorage.setItem(TUTORIAL_KEY, '1');
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    score = 0; highestTier = 1; nextPiece = pickPiece(); busy = false;
    clearState();
    render();
  }

  function showWelcome() {
    clearTutorialUI();
    const app = document.querySelector('.app');
    const w = document.createElement('div');
    w.id = 'tut-welcome';
    w.className = 'tut-welcome';
    w.innerHTML =
      '<div class="tut-welcome-icons">' +
        '<div class="tut-welcome-icon" style="background:#C0DD97;color:#173404">' + SVG.leaf + '</div>' +
        '<div class="tut-welcome-icon" style="background:#F4C0D1;color:#4B1528">' + SVG.flower + '</div>' +
        '<div class="tut-welcome-icon" style="background:#F5C4B3;color:#4A1B0C">' + SVG.flame + '</div>' +
        '<div class="tut-welcome-icon" style="background:#9FE1CB;color:#04342C">' + SVG.star + '</div>' +
        '<div class="tut-welcome-icon" style="background:#CECBF6;color:#26215C">' + SVG.crown + '</div>' +
      '</div>' +
      '<div class="tut-welcome-brand">BLOOM</div>' +
      '<div class="tut-welcome-sub">מזג חפצים, גלה דרגות חדשות, והגע עד לכתר</div>' +
      '<button class="tut-welcome-btn" id="tut-welcome-start">בוא נתחיל</button>' +
      '<button class="tut-welcome-skip" id="tut-welcome-skip">אני יודע לשחק, דלג</button>';
    app.appendChild(w);
    document.getElementById('tut-welcome-start').onclick = function() {
      ensureAudio(); startMusic(); w.remove();
      if (localStorage.getItem(TUTORIAL_KEY) !== '1') {
        startTutorialSteps();
      } else {
        init();
      }
    };
    document.getElementById('tut-welcome-skip').onclick = function() {
      ensureAudio(); startMusic(); w.remove();
      localStorage.setItem(TUTORIAL_KEY, '1');
      init(true);
    };
  }

  function buildSpotlightForColumn(col) {
    const gridEl = document.getElementById('grid');
    if (!gridEl) return null;
    const app = document.querySelector('.app');
    const appRect = app.getBoundingClientRect();
    const topCell = gridEl.children[col];
    const bottomCell = gridEl.children[(ROWS - 1) * COLS + col];
    if (!topCell || !bottomCell) return null;
    const topRect = topCell.getBoundingClientRect();
    const botRect = bottomCell.getBoundingClientRect();
    return {
      top: topRect.top - appRect.top - 4,
      left: topRect.left - appRect.left - 4,
      width: topRect.width + 8,
      height: (botRect.bottom - topRect.top) + 8
    };
  }

  function showTutorialOverlay(opts) {
    const app = document.querySelector('.app');
    const existing = document.getElementById('tut-overlay');
    if (existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.id = 'tut-overlay';
    overlay.className = 'tut-overlay';
    let dimHtml = '', spotlightHtml = '', arrowHtml = '';
    if (opts.spotlight) {
      const s = opts.spotlight;
      spotlightHtml = '<div class="tut-spotlight" style="top:' + s.top + 'px;left:' + s.left + 'px;width:' + s.width + 'px;height:' + s.height + 'px;"></div>';
      if (opts.arrow) {
        const ax = s.left + s.width / 2 - 19;
        const ay = s.top - 48;
        arrowHtml = '<div class="tut-arrow" style="top:' + ay + 'px;left:' + ax + 'px;">' + SVG.arrowDown + '</div>';
      }
    } else {
      dimHtml = '<div class="tut-dim"></div>';
    }
    const dots = [];
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const cls = i < tutorialStep ? 'done' : i === tutorialStep ? 'active' : '';
      dots.push('<div class="tut-dot ' + cls + '"></div>');
    }
    const cardPos = opts.cardPosition || 'bottom';
    const showNext = !!opts.showNext;
    const nextLabel = opts.nextLabel || 'הבא';
    const showSkip = opts.showSkip !== false;
    const cardHtml =
      '<div class="tut-card ' + cardPos + '">' +
        '<div class="tut-progress">' + dots.join('') + '</div>' +
        '<div class="tut-step">צעד ' + tutorialStep + ' מתוך ' + TOTAL_STEPS + '</div>' +
        '<div class="tut-title">' + opts.title + '</div>' +
        '<div class="tut-body">' + opts.body + '</div>' +
        '<div class="tut-buttons">' +
          (showSkip ? '<button class="tut-btn ghost" id="tut-skip">דלג</button>' : '') +
          (showNext ? '<button class="tut-btn" id="tut-next">' + nextLabel + '</button>' : '') +
        '</div>' +
      '</div>';
    overlay.innerHTML = dimHtml + spotlightHtml + arrowHtml + cardHtml;
    app.appendChild(overlay);
    if (showNext) {
      const nb = document.getElementById('tut-next');
      if (nb) nb.onclick = function() {
        if (opts.onNext) opts.onNext();
        else { tutorialStep++; showTutorialStep(); }
      };
    }
    const sb = document.getElementById('tut-skip');
    if (sb) sb.onclick = function() { endTutorial(true); };
  }

  function showDemoCaption(text) {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap) return;
    const existing = wrap.querySelector('.demo-caption');
    if (existing) existing.remove();
    const c = document.createElement('div');
    c.className = 'demo-caption';
    c.textContent = text;
    wrap.appendChild(c);
  }

  function clearDemoCaption() {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap) return;
    const existing = wrap.querySelector('.demo-caption');
    if (existing) existing.remove();
  }

  function startTutorialSteps() {
    tutorialActive = true;
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    score = 0; highestTier = 1; busy = false;
    clearState();
    tutorialStep = 1;
    showTutorialStep();
  }

  function tutorialAfterDrop() {
    if (tutorialStep === 2) {
      tutorialStep = 3;
      setTimeout(function() { setupStep3(); }, 850);
    } else if (tutorialStep === 3) {
      tutorialStep = 4;
      setTimeout(function() { setupStep4(); }, 1200);
    } else if (tutorialStep === 5) {
      tutorialStep = 6;
      setTimeout(function() { setupStep6(); }, 1500);
    }
  }

  function showTutorialStep() {
    if (tutorialStep === 1) setupStep1();
    else if (tutorialStep === 2) setupStep2();
    else if (tutorialStep === 3) setupStep3();
    else if (tutorialStep === 4) setupStep4();
    else if (tutorialStep === 5) setupStep5();
    else if (tutorialStep === 6) setupStep6();
  }

  /* STEP 1 — Show the board */
  function setupStep1() {
    nextPiece = 2;
    render();
    setTimeout(function() {
      showTutorialOverlay({
        title: 'זה הלוח שלך',
        body: 'יש לוח של <b>4 עמודות</b> ו-<b>6 שורות</b>. כל פעם מקבלים חפץ חדש למעלה — מה ש"<b>הבא</b>". הלוח כרגע ריק.',
        cardPosition: 'bottom',
        showNext: true,
        onNext: function() { tutorialStep = 2; setupStep2(); }
      });
    }, 100);
  }

  /* STEP 2 — Drop first leaf */
  function setupStep2() {
    nextPiece = 2;
    render();
    setTimeout(function() {
      const spotlight = buildSpotlightForColumn(1);
      showTutorialOverlay({
        title: 'תפיל את העלה הראשון',
        body: 'הקש על העמודה <b>המודגשת</b>. החפץ הבא ייפול בה לתחתית.',
        spotlight: spotlight, arrow: true,
        cardPosition: 'bottom', showNext: false
      });
      tutorialOnDrop = function(col) {
        if (col !== 1) {
          const cardBody = document.querySelector('#tut-overlay .tut-body');
          if (cardBody) cardBody.innerHTML = 'תקליק על העמודה <b>המודגשת בכתום</b> — לא על אחרת.';
          return false;
        }
        clearTutorialUI();
        return true;
      };
    }, 100);
  }

  /* STEP 3 — Horizontal merge */
  function setupStep3() {
    nextPiece = 2;
    render();
    setTimeout(function() {
      const spotlight = buildSpotlightForColumn(2);
      showTutorialOverlay({
        title: 'מיזוג ראשון: זוג צמוד',
        body: 'תפיל עלה שני <b>ליד הראשון</b>. שני עלים נוגעים — מתמזגים ל<b>פרח</b>.',
        spotlight: spotlight, arrow: true,
        cardPosition: 'bottom', showNext: false
      });
      tutorialOnDrop = function(col) {
        if (col !== 2) {
          const cardBody = document.querySelector('#tut-overlay .tut-body');
          if (cardBody) cardBody.innerHTML = 'תקליק על העמודה <b>המודגשת</b> כדי שהעלה יהיה ליד הקיים.';
          return false;
        }
        clearTutorialUI();
        return true;
      };
    }, 100);
  }

  /* STEP 4 — Auto-demo: vertical merge + group of 3 + group of 4 */
  async function setupStep4() {
    tutorialOnDrop = null;
    clearTutorialUI();
    showTutorialOverlay({
      title: 'איך עוד אפשר למזג?',
      body: 'מיזוג עובד בכל כיוון, ועדיף יותר חפצים יחד. <b>צפה בשלוש דוגמאות</b>:',
      cardPosition: 'top',
      showNext: true,
      nextLabel: 'הראה לי',
      onNext: function() {
        clearTutorialUI();
        runStep4Demo();
      }
    });
  }

  async function runStep4Demo() {
    // Demo A: Vertical merge (column stack)
    showDemoCaption('דוגמה 1 מתוך 3 — מיזוג אנכי');
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    grid[5][1] = 3; // flower at bottom of col 1
    score = 0; highestTier = 3;
    render();
    await sleep(900);
    // Drop another flower at col 1 → stacks on top → vertical merge
    await demoDrop(1, 3);
    await sleep(1100);

    // Demo B: 3 in a row merge
    showDemoCaption('דוגמה 2 מתוך 3 — שלישייה (מיזוג גדול יותר)');
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    grid[5][0] = 3;
    grid[5][2] = 3;
    render();
    await sleep(900);
    // Drop flower at col 1 → all 3 flowers in row merge → flame
    await demoDrop(1, 3);
    await sleep(1300);

    // Demo C: L-shape (4 pieces in a connected group)
    showDemoCaption('דוגמה 3 מתוך 3 — צורת L (4 חפצים)');
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    grid[5][1] = 4; // flame
    grid[5][2] = 4; // flame
    grid[4][1] = 4; // flame above col 1 — but gravity? in still grid this works
    render();
    await sleep(900);
    // Drop flame at col 2 → 4 flames in L shape merge → bolt
    await demoDrop(2, 4);
    await sleep(1400);

    clearDemoCaption();
    showTutorialOverlay({
      title: 'יופי, ראית את שלוש הצורות',
      body: '<b>הכלל פשוט:</b> 2 או יותר חפצים זהים שנוגעים זה בזה (אופקי או אנכי, או צורה מעוקלת) — מתמזגים. ככל שיותר חפצים יחד, יותר נקודות.',
      cardPosition: 'bottom',
      showNext: true,
      nextLabel: 'הבא: שרשרת',
      onNext: function() { tutorialStep = 5; setupStep5(); }
    });
  }

  async function demoDrop(col, tier) {
    let row = -1;
    for (let r = ROWS - 1; r >= 0; r--) if (grid[r][col] === 0) { row = r; break; }
    if (row === -1) return;
    // Highlight target column briefly
    const gridEl = document.getElementById('grid');
    if (gridEl) {
      const cell = gridEl.children[row * COLS + col];
      if (cell) cell.classList.add('demo-glow');
    }
    await sleep(500);
    grid[row][col] = tier;
    render({ appearing: [row, col] });
    soundDrop();
    await sleep(280);
    await processChainsForDemo();
  }

  async function processChainsForDemo() {
    let chainCount = 0;
    while (true) {
      let merged = null;
      outer: for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = grid[r][c];
          if (t === 0 || t === MAX_TIER) continue;
          const group = findGroup(r, c, t);
          if (group.length >= 2) {
            let kr = -1, kc = -1;
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr > kr || (gr === kr && gc < kc)) { kr = gr; kc = gc; }
            }
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr === kr && gc === kc) continue;
              grid[gr][gc] = 0;
            }
            const nt = Math.min(t + 1, MAX_TIER);
            grid[kr][kc] = nt;
            chainCount++;
            const multiplier = 1 + (chainCount - 1) * 0.5;
            const points = pointsFor(nt, group.length, multiplier);
            if (nt > highestTier) highestTier = nt;
            merged = [kr, kc];
            showFloatingScore(kr, kc, points, chainCount);
            soundMerge(nt);
            if (chainCount >= 2) {
              const m = chainCount === 2 ? '1.5' : chainCount === 3 ? '2' : chainCount === 4 ? '2.5' : '3';
              showChainBadge(chainCount, m);
              soundChain(chainCount);
            }
            break outer;
          }
        }
      }
      if (!merged) break;
      render({ merging: merged });
      await sleep(280);
      applyGravity();
      render();
      await sleep(200);
    }
  }

  /* STEP 5 — Chain reaction (interactive) */
  function setupStep5() {
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    grid[5][1] = 3; // flower
    grid[5][2] = 4; // flame
    score = 0; highestTier = 4;
    nextPiece = 3;
    render();
    setTimeout(function() {
      const spotlight = buildSpotlightForColumn(0);
      showTutorialOverlay({
        title: 'שרשרת = הכפלת ניקוד',
        body: 'תפיל את הפרח <b>בעמודה השמאלית</b>. הוא יתמזג עם הפרח שכבר שם → ייהפך לאש → ינגע באש הקיימת → <b>שרשרת ×1.5</b>. הניקוד מוכפל.',
        spotlight: spotlight, arrow: true,
        cardPosition: 'bottom', showNext: false
      });
      tutorialOnDrop = function(col) {
        if (col !== 0) {
          const cardBody = document.querySelector('#tut-overlay .tut-body');
          if (cardBody) cardBody.innerHTML = 'תקליק על העמודה <b>המודגשת בכתום</b> כדי לבצע את השרשרת.';
          return false;
        }
        clearTutorialUI();
        return true;
      };
    }, 100);
  }

  /* STEP 6 — The full ladder of tiers */
  function setupStep6() {
    clearTutorialUI();
    const app = document.querySelector('.app');
    const ladder = document.createElement('div');
    ladder.id = 'tut-ladder';
    ladder.className = 'ladder-screen';

    const rows = [];
    for (let t = 1; t < MAX_TIER; t++) {
      const from = TIERS[t];
      const to = TIERS[t + 1];
      rows.push(
        '<div class="ladder-row" data-idx="' + t + '">' +
          '<div class="ladder-pair">' +
            '<div class="ladder-piece" style="background:' + from.bg + ';color:' + from.fg + '">' + from.svg + '</div>' +
            '<div class="ladder-plus">+</div>' +
            '<div class="ladder-piece" style="background:' + from.bg + ';color:' + from.fg + '">' + from.svg + '</div>' +
          '</div>' +
          '<div class="ladder-arrow">←</div>' +
          '<div class="ladder-result-wrap">' +
            '<div class="ladder-result" style="background:' + to.bg + ';color:' + to.fg + '">' + to.svg + '</div>' +
            '<div class="ladder-text">' + from.name + ' → ' + to.name + '</div>' +
          '</div>' +
        '</div>'
      );
    }

    ladder.innerHTML =
      '<div class="ladder-title">המסלול המלא לכתר</div>' +
      '<div class="ladder-sub">8 דרגות. ככל שעולים — יותר נקודות.</div>' +
      '<div class="ladder-stairs">' + rows.join('') + '</div>' +
      '<button class="ladder-btn" id="ladder-start" style="display:none">התחל לשחק</button>';
    app.appendChild(ladder);

    // Reveal each row in sequence with a sound, then show button
    const rowEls = ladder.querySelectorAll('.ladder-row');
    rowEls.forEach(function(el, i) {
      setTimeout(function() {
        el.classList.add('shown', 'current');
        soundMerge(i + 2);
        setTimeout(function() { el.classList.remove('current'); }, 500);
      }, 250 + i * 400);
    });
    setTimeout(function() {
      const btn = document.getElementById('ladder-start');
      btn.style.display = 'block';
      btn.onclick = function() { endTutorial(true); };
      soundMilestone(MAX_TIER);
    }, 250 + rowEls.length * 400 + 200);
  }

  /* ============================================================ */

  document.getElementById('reset').onclick = function() {
    if (tutorialActive) return;
    if (grid && !isGameOver() && grid.some(function(row) { return row.some(function(c) { return c !== 0; }); })) {
      if (!confirm('להתחיל מחדש? המשחק הנוכחי יימחק.')) return;
    }
    clearState();
    init(true);
  };
  document.getElementById('info').onclick = showInfo;
  document.getElementById('mute').onclick = toggleMute;

  window.addEventListener('beforeunload', function() { saveState(); });
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') { saveState(); stopMusic(); }
    else if (document.visibilityState === 'visible' && !muted) startMusic();
  });

  updateMuteUI();

  showWelcome();
})();
</script>

</body>
</html>
