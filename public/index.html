<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BLOOM — משחק מיזוג</title>
<meta property="og:title" content="BLOOM — משחק מיזוג">
<meta property="og:description" content="מזג, התקדם, הגע לכתר. שחק עכשיו.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #F5F5F0;
    color: #1C1A18;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .app {
    width: 100%;
    max-width: 380px;
    margin: auto;
    background: #FFFFFF;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 2px 30px rgba(0,0,0,0.06);
    position: relative;
    min-height: 600px;
  }
  .top {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .brand { font-size: 16px; letter-spacing: 0.22em; font-weight: 600; color: #1C1A18; }
  .stats {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .stats > .stat {
    flex: 1;
    background: #FAFAF6;
    border-radius: 9px;
    padding: 6px 10px;
    text-align: right;
    direction: rtl;
    overflow: hidden;
  }
  .stat-label { font-size: 9px; color: #A8A6A0; letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-val { font-size: 16px; font-weight: 700; color: #1C1A18; margin-top: 2px; display: block; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .stat-val.bump { animation: bump 0.32s ease-out; }
  @keyframes bump {
    0% { transform: scale(1); color: #1C1A18; }
    40% { transform: scale(1.22); color: #BA7517; }
    100% { transform: scale(1); color: #1C1A18; }
  }
  .top-buttons { display: flex; gap: 5px; }
  .icon-btn {
    background: none; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .icon-btn svg { width: 15px; height: 15px; color: #6F6E68; }
  .icon-btn:hover { background: #F5F5F0; }
  .icon-btn.muted svg { color: #C84040; }

  .mute-menu {
    position: absolute;
    z-index: 160;
    top: 56px;
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 11px;
    padding: 5px;
    min-width: 200px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.14);
    direction: rtl;
  }
  .mute-menu.from-top { left: 14px; }
  .mute-menu.from-home { top: 60px; left: 16px; }
  .mute-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 11px; border-radius: 8px;
    cursor: pointer; user-select: none;
    font-size: 13px; color: #1C1A18;
  }
  .mute-item:hover { background: #FAFAF6; }
  .mute-item-icon {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    color: #6F6E68; flex-shrink: 0;
  }
  .mute-item-icon svg { width: 16px; height: 16px; }
  .mute-item-label { flex: 1; text-align: right; font-weight: 500; }
  .mute-item-state {
    font-size: 10px; padding: 2px 8px;
    border-radius: 10px;
    background: #E6F4D7; color: #2E5A0F;
    letter-spacing: 0.02em;
  }
  .mute-item.off .mute-item-state {
    background: #FCE4E0; color: #B23A1A;
  }
  .mute-item.off .mute-item-icon { color: #C84040; }
  .mute-item.off .mute-item-label { color: #6F6E68; }
  .mute-item.mute-item-all {
    margin-top: 3px;
    border-top: 1px solid rgba(0,0,0,0.05);
    border-radius: 0 0 8px 8px;
    padding-top: 11px;
    justify-content: center;
    color: #6F6E68;
    font-weight: 600;
  }
  .mute-item.mute-item-all:hover { background: #F5F2EC; color: #1C1A18; }
  .next-bar {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .next-label { font-size: 12px; color: #6F6E68; }
  .next-piece {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .next-piece svg { width: 24px; height: 24px; }
  .next-value { flex: 1; font-size: 11px; color: #A8A6A0; text-align: left; }
  .grid-wrap { padding: 12px; direction: ltr; position: relative; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .cell {
    aspect-ratio: 1; background: #F5F2EC; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.12s;
  }
  .cell:hover { background: #EFEBE2; }
  .cell.filled svg { width: 30px; height: 30px; }
  .cell.appearing { animation: pop 0.22s ease-out; }
  .cell.merging { animation: merge 0.24s ease-out; }
  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes merge { 0% { transform: scale(1); } 50% { transform: scale(1.28); } 100% { transform: scale(1); } }

  .float-score {
    position: absolute;
    background: #1C1A18;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 12px;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translate(-50%, 10%) scale(0.6); }
    18%  { opacity: 1; transform: translate(-50%, -30%) scale(1.08); }
    100% { opacity: 0; transform: translate(-50%, -130%) scale(1); }
  }
  .chain-badge {
    position: absolute;
    top: 50%; left: 50%;
    background: #EF9F27;
    color: #412402;
    font-weight: 800;
    font-size: 20px;
    padding: 10px 22px;
    border-radius: 24px;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 25;
    white-space: nowrap;
    animation: chainPop 0.75s ease-out forwards;
  }
  @keyframes chainPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.55) rotate(-6deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.18) rotate(-2deg); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -75%) scale(0.95) rotate(0); }
  }

  .overlay { padding: 20px 22px 22px; text-align: center; direction: rtl; }
  .over-title { font-size: 13px; font-weight: 500; color: #6F6E68; letter-spacing: 0.08em; text-transform: uppercase; }
  .over-score { font-size: 42px; font-weight: 700; color: #1C1A18; margin-top: 8px; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .over-sub { font-size: 13px; color: #6F6E68; margin-top: 6px; }
  .tier-table { display: flex; flex-direction: column; gap: 4px; margin: 16px 0 4px; }
  .tier-row { display: flex; align-items: center; gap: 10px; padding: 5px 8px; border-radius: 7px; }
  .tier-row.reached { background: #FAFAF6; }
  .tier-row.locked { opacity: 0.4; }
  .tier-icon-sm { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tier-icon-sm svg { width: 14px; height: 14px; }
  .tier-name { flex: 1; font-size: 13px; color: #1C1A18; text-align: right; }
  .tier-pts { font-size: 12px; color: #6F6E68; font-variant-numeric: tabular-nums; }

  .share-label { font-size: 10px; color: #A8A6A0; margin: 14px 0 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .share-card {
    padding: 12px 14px; background: #DCF8C6; border-radius: 10px;
    direction: ltr; text-align: left;
    font-size: 13px; line-height: 1.8; color: #1B5E20;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .btn {
    width: 100%; padding: 13px; border-radius: 10px;
    background: #1C1A18; color: #FFFFFF;
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 14px;
  }
  .btn.secondary { background: #F5F2EC; color: #1C1A18; margin-top: 8px; }
  .btn:active { transform: scale(0.98); }

  .info-modal {
    position: fixed; inset: 0;
    background: rgba(28,26,24,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .info-card {
    background: #FFFFFF; border-radius: 16px; padding: 18px 18px 16px;
    width: 100%; max-width: 340px;
    max-height: calc(100vh - 40px);
    max-height: calc(100dvh - 40px);
    overflow-y: auto;
  }
  .info-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .info-sub { font-size: 12px; color: #6F6E68; margin-bottom: 12px; }
  .credits {
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-size: 10px; color: #A8A6A0;
    line-height: 1.55; direction: rtl; text-align: right;
  }
  .credits a { color: #6F6E68; }
  .info-close { float: left; background: none; border: none; cursor: pointer; padding: 0; }
  .info-close svg { width: 18px; height: 18px; color: #6F6E68; }

  .mode-bar {
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: linear-gradient(90deg, #FFF7E6 0%, #FFFFFF 100%);
  }
  .mode-bar.practice { background: #FAFAF6; }
  .mode-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .mode-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #EF9F27; color: #412402; flex-shrink: 0; }
  .mode-icon svg { width: 14px; height: 14px; }
  .mode-bar.practice .mode-icon { background: #D3D1C7; color: #2C2C2A; }
  .mode-text { min-width: 0; }
  .mode-title { font-size: 12px; font-weight: 600; color: #1C1A18; line-height: 1.15; }
  .mode-sub { font-size: 10px; color: #6F6E68; line-height: 1.15; margin-top: 1px; }
  .mode-switch {
    background: none; border: 1px solid rgba(0,0,0,0.12); border-radius: 14px;
    padding: 4px 10px; font-size: 11px; color: #6F6E68; cursor: pointer;
    font-family: inherit; flex-shrink: 0;
  }
  .mode-switch:hover { background: #F5F2EC; }

  .leaderboard { margin: 14px 0 4px; }
  .lb-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; color: #A8A6A0; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .lb-list { display: flex; flex-direction: column; gap: 3px; }
  .lb-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 8px; background: #FAFAF6;
    font-size: 13px;
  }
  .lb-row.you { background: #FFF1D0; }
  .lb-rank { width: 22px; font-weight: 600; color: #6F6E68; font-variant-numeric: tabular-nums; text-align: center; flex-shrink: 0; }
  .lb-row.you .lb-rank { color: #BA7517; }
  .lb-name { flex: 1; color: #1C1A18; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .lb-score { font-weight: 600; color: #1C1A18; font-variant-numeric: tabular-nums; }
  .lb-empty { font-size: 12px; color: #A8A6A0; text-align: center; padding: 14px 8px; }
  .lb-loading { font-size: 12px; color: #A8A6A0; text-align: center; padding: 14px 8px; }
  .lb-rank-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #FFF1D0; color: #BA7517;
    padding: 4px 10px; border-radius: 14px; font-size: 12px; font-weight: 600;
    margin-top: 8px;
  }
  .lb-tabs { display: flex; gap: 6px; margin: 6px 0 12px; }
  .lb-tab {
    flex: 1; padding: 8px 10px; border-radius: 8px;
    background: #F5F2EC; color: #6F6E68;
    border: none; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 500;
  }
  .lb-tab.active { background: #1C1A18; color: #FFFFFF; }
  .lb-range { font-size: 11px; color: #A8A6A0; margin-bottom: 8px; direction: rtl; text-align: right; }

  .streak-val { color: #D95A1B; font-variant-numeric: tabular-nums; }
  .streak-val.zero { color: #A8A6A0; }

  .ach-group-title {
    font-size: 11px; color: #BA7517; letter-spacing: 0.06em; font-weight: 700;
    margin: 12px 0 6px; text-transform: uppercase; direction: rtl; text-align: right;
  }
  .ach-group-title:first-of-type { margin-top: 4px; }
  .ach-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 9px;
    background: #FAFAF6; margin-bottom: 4px;
    direction: rtl;
  }
  .ach-row.unlocked { background: #FFF5E1; }
  .ach-row.locked { opacity: 0.45; }
  .ach-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    background: #FFFFFF; color: #BA7517; flex-shrink: 0;
  }
  .ach-row.unlocked .ach-icon { background: #FAC775; color: #4A2E00; }
  .ach-row.locked .ach-icon { background: #E8E5DE; color: #A8A6A0; }
  .ach-icon svg { width: 15px; height: 15px; }
  .ach-text { flex: 1; text-align: right; }
  .ach-name { font-size: 13px; font-weight: 600; color: #1C1A18; }
  .ach-row.locked .ach-name { color: #6F6E68; }
  .ach-desc { font-size: 11px; color: #6F6E68; margin-top: 1px; }
  .ach-summary {
    font-size: 12px; color: #6F6E68;
    text-align: center; margin: 4px 0 10px;
  }
  .ach-summary b { color: #BA7517; font-weight: 700; }
  .ach-unlock-toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: #1C1A18; color: #FFFFFF;
    padding: 10px 16px; border-radius: 24px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 300; display: flex; align-items: center; gap: 8px;
    animation: achToastIn 0.4s ease-out, achToastOut 0.4s ease-in 2.6s forwards;
    direction: rtl;
  }
  .ach-unlock-toast svg { width: 16px; height: 16px; color: #FAC775; }
  @keyframes achToastIn {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes achToastOut {
    from { opacity: 1; transform: translate(-50%, 0); }
    to   { opacity: 0; transform: translate(-50%, 20px); }
  }

  .home-screen {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #F5F5F0 0%, #FFFFFF 60%);
    z-index: 250;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 84px 24px 30px;
    direction: rtl; text-align: center;
    overflow: hidden;
  }
  .home-mute {
    position: absolute; top: 16px; left: 16px;
    width: 34px; height: 34px;
    background: none; border: 1px solid rgba(0,0,0,0.08);
    border-radius: 9px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .home-mute svg { width: 16px; height: 16px; color: #6F6E68; }
  .home-mute.muted svg { color: #C84040; }
  .home-icons {
    display: flex; gap: 8px; margin-bottom: 32px;
  }
  .home-icon {
    width: 52px; height: 52px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    animation: homeFloat 2.4s ease-in-out infinite;
  }
  .home-icon svg { width: 26px; height: 26px; }
  .home-icon:nth-child(2) { animation-delay: 0.12s; }
  .home-icon:nth-child(3) { animation-delay: 0.24s; }
  .home-icon:nth-child(4) { animation-delay: 0.36s; }
  .home-icon:nth-child(5) { animation-delay: 0.48s; }
  @keyframes homeFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .home-brand {
    font-size: 36px; letter-spacing: 0.3em;
    font-weight: 700; color: #1C1A18;
    margin-bottom: 14px;
  }
  .home-sub {
    font-size: 14px; color: #6F6E68;
    margin-bottom: 42px; max-width: 280px;
    line-height: 1.6;
  }
  .home-start {
    width: 100%; max-width: 280px;
    padding: 16px 18px; border-radius: 12px;
    background: #1C1A18; color: #FFFFFF;
    border: none; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: transform 0.12s;
  }
  .home-start:active { transform: scale(0.98); }
  .home-skip {
    margin-top: 18px; background: none; border: none;
    color: #A8A6A0; font-size: 13px;
    cursor: pointer; padding: 8px;
    font-family: inherit;
  }
  .home-skip:hover { color: #6F6E68; }
  .home-version {
    position: absolute; bottom: 18px; left: 0; right: 0;
    font-size: 11px; color: #C8C5BE;
    letter-spacing: 0.12em;
  }

  .countdown {
    display: inline-flex; align-items: center; gap: 6px;
    background: #F5F2EC; color: #6F6E68;
    padding: 6px 12px; border-radius: 14px;
    font-size: 12px; font-variant-numeric: tabular-nums;
    margin-top: 10px;
  }
  .countdown svg { width: 13px; height: 13px; }

  .name-modal { padding: 18px; }
  .name-input {
    width: 100%; padding: 11px 13px; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 10px; font-size: 14px; font-family: inherit;
    background: #FAFAF6; color: #1C1A18; direction: rtl;
    margin-top: 10px;
  }
  .name-input:focus { outline: none; border-color: #BA7517; background: #FFFFFF; }
</style>
</head>
<body>

<audio id="music-lobby" src="bloom-music-lobby.mp3" loop preload="auto"></audio>
<audio id="music-game"  src="bloom-music.mp3"      loop preload="auto"></audio>
<audio id="music-fail"  src="bloom-music-fail.mp3" loop preload="auto"></audio>

<div class="app">
  <div class="top">
    <div class="top-row">
      <div class="brand">BLOOM</div>
      <div class="top-buttons">
        <button class="icon-btn" id="home-btn" aria-label="חזרה לבית">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9M5 10v10h14V10M10 20v-6h4v6"/></svg>
        </button>
        <button class="icon-btn" id="mute" aria-label="השתק">
          <svg id="mute-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 8a5 5 0 0 1 0 8M17.7 5a9 9 0 0 1 0 14M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15"/></svg>
        </button>
        <button class="icon-btn" id="leaderboard" aria-label="טבלת מובילים">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="5" height="7" rx="1"/><rect x="9.5" y="9" width="5" height="12" rx="1"/><rect x="16" y="4" width="5" height="17" rx="1"/></svg>
        </button>
        <button class="icon-btn" id="achievements" aria-label="הישגים">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 4H4v2a3 3 0 0 0 3 3M17 4h3v2a3 3 0 0 1-3 3"/></svg>
        </button>
        <button class="icon-btn" id="info" aria-label="מידע על ניקוד">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
        </button>
        <button class="icon-btn" id="reset" aria-label="התחל מחדש">

<script>
(function() {
  const ROWS = 6, COLS = 4;

  const SVG = {
    circle:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/></svg>',
    leaf:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21c.5-4.5 2.5-8 7-10"/><path d="M9 18c6.218 0 10.5-3.288 11-12v-2h-4.014c-9 0-11.986 4-12 9c0 1 0 3 2 5h3z"/></svg>',
    flower:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><circle cx="12" cy="5.5" r="3"/><circle cx="12" cy="18.5" r="3"/><circle cx="5.5" cy="12" r="3"/><circle cx="18.5" cy="12" r="3"/></svg>',
    flame:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a5 5 0 0 0 10 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-2 2z"/></svg>',
    bolt:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3v7h6l-8 11v-7H5l8-11z"/></svg>',
    star:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17.75l-6.172 3.245 1.179-6.873-4.993-4.867 6.9-1.002L12 1.999l3.086 6.254 6.9 1.002-4.993 4.867 1.179 6.873z"/></svg>',
    diamond: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5h12l3 5-9 11-9-11z"/><path d="M3 10h18M9 5l3 5-3 5M15 5l-3 5 3 5"/></svg>',
    crown:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l3.5 9h11l3.5-9-5 4-4-7-4 7z"/></svg>'
  };

  const TIERS = [
    null,
    { svg: SVG.circle,  bg: '#D3D1C7', fg: '#2C2C2A', name: 'אבן',    emoji: '⬜' },
    { svg: SVG.leaf,    bg: '#C0DD97', fg: '#173404', name: 'עלה',    emoji: '🟩' },
    { svg: SVG.flower,  bg: '#F4C0D1', fg: '#4B1528', name: 'פרח',    emoji: '🟧' },
    { svg: SVG.flame,   bg: '#F5C4B3', fg: '#4A1B0C', name: 'אש',     emoji: '🟥' },
    { svg: SVG.bolt,    bg: '#FAC775', fg: '#412402', name: 'ברק',    emoji: '🟨' },
    { svg: SVG.star,    bg: '#9FE1CB', fg: '#04342C', name: 'כוכב',   emoji: '🟦' },
    { svg: SVG.diamond, bg: '#B5D4F4', fg: '#042C53', name: 'יהלום',  emoji: '💎' },
    { svg: SVG.crown,   bg: '#CECBF6', fg: '#26215C', name: 'כתר',    emoji: '👑' }
  ];
  const MAX_TIER = TIERS.length - 1;
  const WEIGHTS = [0, 55, 28, 12, 5];
  const BEST_KEY = 'bloom_best_score';
  const NAME_KEY = 'bloom_player_name';
  const DEVICE_KEY = 'bloom_device_id';
  const DAILY_PLAYED_PREFIX = 'bloom_daily_';
  const MUTE_KEY = 'bloom_muted';
  const MUSIC_MUTE_KEY = 'bloom_muted_music';
  const SFX_MUTE_KEY = 'bloom_muted_sfx';
  const STREAK_KEY = 'bloom_streak';
  const ACH_KEY = 'bloom_achievements';
  const GAMES_COUNT_KEY = 'bloom_games_played';

  // Same-origin API. When the game is served from the Express backend, this
  // works as-is. When opened from file:// the leaderboard simply won't load.
  const API_BASE = '';

  /* ============ AUDIO ============ */
  let audioCtx = null;
  // Granular mute: music (mp3 tracks) and sfx (Web Audio tones + haptics) are
  // controlled independently. Migrate from the legacy MUTE_KEY when present.
  const legacyMutedRaw = localStorage.getItem(MUTE_KEY);
  function readMuteKey(key) {
    const v = localStorage.getItem(key);
    if (v === '1') return true;
    if (v === '0') return false;
    return legacyMutedRaw === '1';
  }
  let musicMuted = readMuteKey(MUSIC_MUTE_KEY);
  let sfxMuted = readMuteKey(SFX_MUTE_KEY);
  function saveMuteState() {
    try {
      localStorage.setItem(MUSIC_MUTE_KEY, musicMuted ? '1' : '0');
      localStorage.setItem(SFX_MUTE_KEY, sfxMuted ? '1' : '0');
    } catch (e) {}
  }
  function isAnyMuted() { return musicMuted || sfxMuted; }

  function ensureAudio() {
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function() {});
    return audioCtx;
  }

  /* Music manager: 3 tracks (lobby/game/fail) with 0.5s cross-fade */
  const MUSIC_VOLUME = 0.28;
  const MUSIC_FADE_MS = 500;
  const MUSIC_FADE_STEPS = 20;
  const MUSIC_TRACKS = {
    lobby: { id: 'music-lobby', el: null, fadeTimer: null },
    game:  { id: 'music-game',  el: null, fadeTimer: null },
    fail:  { id: 'music-fail',  el: null, fadeTimer: null }
  };
  let currentTrack = null;

  function getTrackEl(name) {
    const t = MUSIC_TRACKS[name];
    if (!t) return null;
    if (!t.el) t.el = document.getElementById(t.id);
    return t.el;
  }
  function clearFade(name) {
    const t = MUSIC_TRACKS[name];
    if (t && t.fadeTimer) { clearInterval(t.fadeTimer); t.fadeTimer = null; }
  }
  function fadeOutTrack(name, ms, onDone) {
    const t = MUSIC_TRACKS[name];
    const el = getTrackEl(name);
    if (!t || !el) { onDone && onDone(); return; }
    clearFade(name);
    if (el.paused || el.volume <= 0.001) {
      try { el.pause(); el.currentTime = 0; el.volume = 0; } catch(e) {}
      onDone && onDone();
      return;
    }
    const start = el.volume;
    const stepMs = ms / MUSIC_FADE_STEPS;
    let i = 0;
    t.fadeTimer = setInterval(function() {
      i++;
      el.volume = Math.max(0, start * (1 - i / MUSIC_FADE_STEPS));
      if (i >= MUSIC_FADE_STEPS) {
        clearFade(name);
        try { el.pause(); el.currentTime = 0; el.volume = 0; } catch(e) {}
        onDone && onDone();
      }
    }, stepMs);
  }
  function fadeInTrack(name, ms, target) {
    const t = MUSIC_TRACKS[name];
    const el = getTrackEl(name);
    if (!t || !el) return;
    clearFade(name);
    target = (typeof target === 'number') ? target : MUSIC_VOLUME;
    try {
      el.volume = 0;
      el.currentTime = 0;
      const p = el.play();
      if (p && p.catch) p.catch(function() {});
    } catch(e) {}
    const stepMs = ms / MUSIC_FADE_STEPS;
    let i = 0;
    t.fadeTimer = setInterval(function() {
      i++;
      el.volume = Math.min(target, target * (i / MUSIC_FADE_STEPS));
      if (i >= MUSIC_FADE_STEPS) clearFade(name);
    }, stepMs);
  }
  function playMusic(name) {
    if (!MUSIC_TRACKS[name]) return;
    const sameTrack = currentTrack === name;
    const el = getTrackEl(name);
    if (sameTrack && el && !el.paused && el.volume > 0.001) return;
    const prev = currentTrack;
    currentTrack = name;
    if (musicMuted) return;
    if (prev && prev !== name) {
      fadeOutTrack(prev, MUSIC_FADE_MS, function() {
        if (currentTrack === name) fadeInTrack(name, MUSIC_FADE_MS, MUSIC_VOLUME);
      });
    } else {
      fadeInTrack(name, MUSIC_FADE_MS, MUSIC_VOLUME);
    }
  }
  function stopAllMusic() {
    Object.keys(MUSIC_TRACKS).forEach(function(k) {
      fadeOutTrack(k, MUSIC_FADE_MS);
    });
    currentTrack = null;
  }
  function pauseAllMusic() {
    Object.keys(MUSIC_TRACKS).forEach(function(k) {
      clearFade(k);
      const el = getTrackEl(k);
      if (el) try { el.pause(); } catch(e) {}
    });
  }
  function resumeCurrentMusic() {
    if (!currentTrack || musicMuted) return;
    const el = getTrackEl(currentTrack);
    if (!el) return;
    try { el.volume = MUSIC_VOLUME; const p = el.play(); if (p && p.catch) p.catch(function() {}); } catch(e) {}
  }
  function tone(opts) {
    if (sfxMuted) return;
    const c = ensureAudio();
    if (!c) return;
    const t0 = c.currentTime + (opts.delay || 0);
    const osc = c.createOscillator();
    const gain = c.createGain();
    const filter = c.createBiquadFilter();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(opts.freq, t0);
    if (opts.bendTo) osc.frequency.exponentialRampToValueAtTime(opts.bendTo, t0 + opts.duration);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(opts.filter || 5000, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(opts.vol || 0.2, t0 + (opts.attack || 0.005));
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + opts.duration);
    osc.connect(filter); filter.connect(gain); gain.connect(c.destination);
    osc.start(t0); osc.stop(t0 + opts.duration + 0.05);
  }

  function soundDrop() {
    tone({ freq: 520, bendTo: 280, duration: 0.12, type: 'sine', vol: 0.14, filter: 3000 });
    tone({ freq: 260, bendTo: 140, duration: 0.15, type: 'sine', vol: 0.09, filter: 1500, delay: 0.005 });
  }

  function soundMerge(tier) {
    const baseFreqs = [0, 0, 330, 392, 466, 523, 622, 740, 880];
    const fundamental = baseFreqs[tier] || 330;
    tone({ freq: fundamental, duration: 0.25, type: 'triangle', vol: 0.18, filter: 5000 });
    tone({ freq: fundamental * 1.5, duration: 0.22, type: 'triangle', vol: 0.12, filter: 6000, delay: 0.025 });
    tone({ freq: fundamental * 2, duration: 0.18, type: 'sine', vol: 0.09, filter: 8000, delay: 0.05 });
    if (tier >= 6) tone({ freq: fundamental * 3, duration: 0.15, type: 'sine', vol: 0.06, filter: 9000, delay: 0.08 });
    if (tier >= 8) tone({ freq: fundamental * 4, duration: 0.2, type: 'sine', vol: 0.07, filter: 10000, delay: 0.12 });
  }

  function soundChain(chainCount) {
    const scale = [523, 587, 659, 784, 880, 1047, 1175];
    for (let i = 0; i < Math.min(chainCount + 1, scale.length); i++) {
      tone({ freq: scale[i], duration: 0.16, type: 'triangle', vol: 0.14, filter: 6000, delay: i * 0.07 });
      tone({ freq: scale[i] * 2, duration: 0.12, type: 'sine', vol: 0.06, filter: 8000, delay: i * 0.07 + 0.01 });
    }
  }

  function soundMilestone(tier) {
    const melody = [523, 659, 784, 1047, 1319];
    for (let i = 0; i < melody.length; i++) {
      tone({ freq: melody[i], duration: 0.22, type: 'triangle', vol: 0.16, filter: 6000, delay: i * 0.09 });
      tone({ freq: melody[i] * 2, duration: 0.18, type: 'sine', vol: 0.08, filter: 8000, delay: i * 0.09 + 0.01 });
    }
    if (tier >= MAX_TIER) {
      const sparkle = [2093, 2349, 2637, 3136];
      for (let i = 0; i < sparkle.length; i++) {
        tone({ freq: sparkle[i], duration: 0.1, type: 'sine', vol: 0.05, filter: 10000, delay: 0.55 + i * 0.04 });
      }
    }
  }

  function soundGameOver() {
    tone({ freq: 392, bendTo: 370, duration: 0.18, type: 'sawtooth', vol: 0.11, filter: 2500 });
    tone({ freq: 349, bendTo: 330, duration: 0.18, type: 'sawtooth', vol: 0.11, filter: 2500, delay: 0.18 });
    tone({ freq: 311, bendTo: 220, duration: 0.5, type: 'sawtooth', vol: 0.13, filter: 2200, delay: 0.36 });
    tone({ freq: 196, bendTo: 165, duration: 0.18, type: 'sine', vol: 0.08, filter: 1500 });
    tone({ freq: 175, bendTo: 165, duration: 0.18, type: 'sine', vol: 0.08, filter: 1500, delay: 0.18 });
    tone({ freq: 156, bendTo: 110, duration: 0.5, type: 'sine', vol: 0.09, filter: 1500, delay: 0.36 });
  }
  function buzz(pattern) {
    if (sfxMuted) return;
    if (navigator.vibrate) try { navigator.vibrate(pattern); } catch(e) {}
  }
  function setMuteIcon(btn, icon, mutedState) {
    if (!btn || !icon) return;
    if (mutedState) {
      btn.classList.add('muted');
      icon.innerHTML = '<path d="M15 8a5 5 0 0 1 1.7 3M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15M21 9l-6 6M15 9l6 6"/>';
    } else {
      btn.classList.remove('muted');
      icon.innerHTML = '<path d="M15 8a5 5 0 0 1 0 8M17.7 5a9 9 0 0 1 0 14M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15"/>';
    }
  }
  function updateMuteUI() {
    setMuteIcon(document.getElementById('mute'), document.getElementById('mute-icon'), isAnyMuted());
    setMuteIcon(document.getElementById('home-mute'), document.getElementById('home-mute-icon'), isAnyMuted());
  }
  function setMusicMuted(next) {
    if (musicMuted === next) return;
    musicMuted = next;
    saveMuteState();
    updateMuteUI();
    syncMuteMenuItems();
    if (musicMuted) pauseAllMusic();
    else { ensureAudio(); resumeCurrentMusic(); }
  }
  function setSfxMuted(next) {
    if (sfxMuted === next) return;
    sfxMuted = next;
    saveMuteState();
    updateMuteUI();
    syncMuteMenuItems();
    if (!sfxMuted) { ensureAudio(); tone({ freq: 523, duration: 0.08, type: 'sine', vol: 0.12 }); }
  }
  function muteAll() { setMusicMuted(true); setSfxMuted(true); }
  function unmuteAll() { setMusicMuted(false); setSfxMuted(false); }

  /* Mute popover menu — 3 choices: music, sfx, all */
  const SVG_MUSIC_NOTE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  const SVG_BELL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>';

  function openMuteMenu(anchor) {
    const existing = document.getElementById('mute-menu');
    if (existing) { closeMuteMenu(); return; }
    ensureAudio();
    const app = document.querySelector('.app');
    if (!app) return;
    const menu = document.createElement('div');
    menu.id = 'mute-menu';
    menu.className = 'mute-menu ' + (anchor === 'home' ? 'from-home' : 'from-top');
    menu.innerHTML =
      '<div class="mute-item" data-kind="music">' +
        '<div class="mute-item-icon">' + SVG_MUSIC_NOTE + '</div>' +
        '<div class="mute-item-label">מוזיקה</div>' +
        '<div class="mute-item-state">פעיל</div>' +
      '</div>' +
      '<div class="mute-item" data-kind="sfx">' +
        '<div class="mute-item-icon">' + SVG_BELL + '</div>' +
        '<div class="mute-item-label">אפקטי קול</div>' +
        '<div class="mute-item-state">פעיל</div>' +
      '</div>' +
      '<div class="mute-item mute-item-all" data-kind="all">' +
        '<div class="mute-item-label">השתק הכל</div>' +
      '</div>';
    app.appendChild(menu);
    syncMuteMenuItems();
    menu.querySelectorAll('.mute-item').forEach(function(it) {
      it.onclick = function(e) {
        e.stopPropagation();
        const kind = it.getAttribute('data-kind');
        if (kind === 'music') setMusicMuted(!musicMuted);
        else if (kind === 'sfx') setSfxMuted(!sfxMuted);
        else if (kind === 'all') {
          if (musicMuted && sfxMuted) unmuteAll(); else muteAll();
        }
      };
    });
    setTimeout(function() {
      const onOutside = function(e) {
        if (!menu.contains(e.target) && !e.target.closest('#mute, #home-mute')) {
          closeMuteMenu();
          document.removeEventListener('pointerdown', onOutside, true);
        }
      };
      document.addEventListener('pointerdown', onOutside, true);
      menu.__outsideHandler = onOutside;
    }, 0);
  }
  function closeMuteMenu() {
    const menu = document.getElementById('mute-menu');
    if (!menu) return;
    if (menu.__outsideHandler) document.removeEventListener('pointerdown', menu.__outsideHandler, true);
    menu.remove();
  }
  function syncMuteMenuItems() {
    const menu = document.getElementById('mute-menu');
    if (!menu) return;
    const musicItem = menu.querySelector('[data-kind="music"]');
    const sfxItem = menu.querySelector('[data-kind="sfx"]');
    const allItem = menu.querySelector('[data-kind="all"]');
    if (musicItem) {
      musicItem.classList.toggle('off', musicMuted);
      musicItem.querySelector('.mute-item-state').textContent = musicMuted ? 'מושתק' : 'פעיל';
    }
    if (sfxItem) {
      sfxItem.classList.toggle('off', sfxMuted);
      sfxItem.querySelector('.mute-item-state').textContent = sfxMuted ? 'מושתק' : 'פעיל';
    }
    if (allItem) {
      allItem.querySelector('.mute-item-label').textContent = (musicMuted && sfxMuted) ? 'הפעל הכל' : 'השתק הכל';
    }
  }

  /* ============ STREAK + ACHIEVEMENTS ============ */
  let currentGameMaxChain = 0;
  let streakBumpedThisSession = false;

  function loadStreak() {
    try {
      const raw = localStorage.getItem(STREAK_KEY);
      if (!raw) return { count: 0, lastPlayed: null };
      const v = JSON.parse(raw);
      return { count: v.count | 0, lastPlayed: v.lastPlayed || null };
    } catch (e) { return { count: 0, lastPlayed: null }; }
  }
  function saveStreak(s) { try { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); } catch (e) {} }
  function daysBetween(a, b) {
    const da = new Date(a + 'T00:00:00Z');
    const db = new Date(b + 'T00:00:00Z');
    return Math.round((db - da) / 86400000);
  }
  function bumpStreak() {
    const today = todayInIsrael();
    const s = loadStreak();
    if (s.lastPlayed === today) return s;
    if (s.lastPlayed && daysBetween(s.lastPlayed, today) === 1) s.count = (s.count | 0) + 1;
    else s.count = 1;
    s.lastPlayed = today;
    saveStreak(s);
    renderStreakBadge();
    checkAchievements({ streakNow: s.count });
    return s;
  }
  function renderStreakBadge() {
    const el = document.getElementById('streak');
    if (!el) return;
    const s = loadStreak();
    const today = todayInIsrael();
    let n = s.count | 0;
    if (s.lastPlayed && daysBetween(s.lastPlayed, today) > 1) n = 0;
    el.textContent = '🔥 ' + n;
    if (n > 0) el.classList.remove('zero');
    else el.classList.add('zero');
  }

  const ACH_GROUPS = [
    { id: 'tier', name: 'דרגות' },
    { id: 'chain', name: 'שרשראות' },
    { id: 'score', name: 'ניקוד' },
    { id: 'streak', name: 'רצף ימים' },
    { id: 'general', name: 'כללי' }
  ];
  const ACHIEVEMENTS = [
    { id: 'tier_fire',   group: 'tier',    name: 'אש',             desc: 'הגעת לדרגת אש',     check: function(s){ return s.highestTier >= 4; } },

      const a = ACHIEVEMENTS[i];

      try {
        if (a.check(state)) { unlocked[a.id] = true; newly.push(a); }

      saveUnlocked(unlocked);
      for (let i = 0; i < newly.length; i++) {

  function pointsFor(tier, groupSize, chainMult) {
    return Math.round(tier * 10 * groupSize * chainMult);
  }
  function pieceValue(tier) {
    return pointsFor(tier, 2, 1);
  }

  function mulberry32(seed) {
    let s = seed >>> 0;
    return function() {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function hashSeed(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function todayInIsrael() {
    try {
      return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Jerusalem' }).format(new Date());
    } catch (e) {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
  }
  function formatDateHe(iso) {
    const parts = iso.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0];
  }
  function msUntilNextIsraelMidnight() {
    const now = new Date();
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Jerusalem', hour12: false,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const parts = fmt.formatToParts(now).reduce(function(o,p){ o[p.type]=p.value; return o; }, {});
    const h = parseInt(parts.hour,10), m = parseInt(parts.minute,10), s = parseInt(parts.second,10);
    const elapsed = (h * 3600 + m * 60 + s) * 1000;
    return 24*3600*1000 - elapsed;
  }
  function formatCountdown(ms) {
    const total = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(total/3600);
    const m = Math.floor((total%3600)/60);
    const s = total%60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function getDeviceId() {
    let id = localStorage.getItem(DEVICE_KEY);
    if (!id) {
      if (window.crypto && crypto.randomUUID) id = crypto.randomUUID();
      else id = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem(DEVICE_KEY, id);
    }
    return id;

  function init(nextMode) {
    if (nextMode) mode = nextMode;
    dailyDate = todayInIsrael();
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    score = 0; highestTier = 1; busy = false;
    currentGameMaxChain = 0;
    leaderboard = [];
    dailyRank = null;
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

    if (mode === 'daily') {
      const seed = hashSeed('bloom-' + dailyDate);
      rng = mulberry32(seed);
      const priorRaw = localStorage.getItem(DAILY_PLAYED_PREFIX + dailyDate);
      if (priorRaw) {
        dailySubmitted = true;
        try {
          const prior = JSON.parse(priorRaw);
          score = prior.score || 0;
          highestTier = prior.tier || 1;
        } catch (e) {}
        nextPiece = pickPiece();
        updateModeBar();
        render({ over: true, alreadyPlayed: true });
        loadLeaderboard();
        return;
      }
      dailySubmitted = false;
    } else {
      rng = Math.random;
      dailySubmitted = false;
    }
    nextPiece = pickPiece();
    updateModeBar();
    render();

  function startCountdown() {
    function tick() {
      const el = document.getElementById('countdown-val');
      if (!el) { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } return; }
      const remaining = msUntilNextIsraelMidnight();
      el.textContent = formatCountdown(remaining);
      if (remaining <= 0) {
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        init('daily');
      }
    }
    if (countdownTimer) clearInterval(countdownTimer);
    tick();
    countdownTimer = setInterval(tick, 1000);

    const modal = document.createElement('div');
    modal.id = 'name-modal';
    modal.className = 'info-modal';
    modal.innerHTML =
      '<div class="info-card">' +
        '<div class="info-title">איך לקרוא לך בטבלת המובילים?</div>' +
        '<div class="info-sub">השם יישמר במכשיר ויופיע ליד התוצאה שלך.</div>' +
        '<input class="name-input" id="name-input" maxlength="24" placeholder="השם שלך" />' +
        '<button class="btn" id="name-save">שמור והמשך</button>' +
        '<button class="btn secondary" id="name-skip">דלג</button>' +
      '</div>';
    wrap.appendChild(modal);
    const input = document.getElementById('name-input');
    setTimeout(function() { input && input.focus(); }, 50);
    function save() {
      const v = (input.value || '').trim().slice(0, 24);
      if (v) { playerName = v; localStorage.setItem(NAME_KEY, v); }
      modal.remove(); cb && cb();
    }
    function skip() {
      if (!playerName) { playerName = 'אנונימי'; }
      modal.remove(); cb && cb();
    }
    document.getElementById('name-save').onclick = save;
    document.getElementById('name-skip').onclick = skip;
    input.onkeydown = function(e) { if (e.key === 'Enter') save(); };
  }

  function pickPiece() {
    const total = WEIGHTS.reduce(function(a,b) { return a+b; }, 0);
    let r = rng() * total;
    for (let i = 1; i < WEIGHTS.length; i++) {
      r -= WEIGHTS[i];
      if (r <= 0) return i;
    }
    return 1;
  }

  function findGroup(sr, sc, tier) {
    const visited = new Set();
    const group = [];
    const stack = [[sr, sc]];
    while (stack.length) {
      const pos = stack.pop();
      const r = pos[0], c = pos[1];
      const k = r * COLS + c;
      if (visited.has(k)) continue;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      if (grid[r][c] !== tier) continue;
      visited.add(k);
      group.push([r, c]);
      stack.push([r-1,c], [r+1,c], [r,c-1], [r,c+1]);
    }
    return group;
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let w = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== 0) {
          if (r !== w) { grid[w][c] = grid[r][c]; grid[r][c] = 0; }
          w--;
        }
      }
    }
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function showFloatingScore(row, col, points, chainCount) {
    const gridEl = document.getElementById('grid');
    if (!gridEl) return;
    const cellIdx = row * COLS + col;
    const cell = gridEl.children[cellIdx];
    if (!cell) return;
    const cellRect = cell.getBoundingClientRect();
    const wrapRect = document.getElementById('grid-wrap').getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'float-score';
    fl.textContent = '+' + points.toLocaleString();
    if (chainCount >= 3) { fl.style.fontSize = '17px'; fl.style.background = '#EF9F27'; fl.style.color = '#412402'; }
    else if (chainCount >= 2) { fl.style.fontSize = '15px'; }
    fl.style.left = (cellRect.left - wrapRect.left + cellRect.width / 2) + 'px';
    fl.style.top = (cellRect.top - wrapRect.top + cellRect.height / 2) + 'px';
    document.getElementById('grid-wrap').appendChild(fl);
    setTimeout(function() { if (fl.parentNode) fl.parentNode.removeChild(fl); }, 900);
  }

  function showChainBadge(chainCount, multiplier) {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap) return;
    const badge = document.createElement('div');
    badge.className = 'chain-badge';
    badge.textContent = 'שרשרת ×' + multiplier;
    wrap.appendChild(badge);
    setTimeout(function() { if (badge.parentNode) badge.parentNode.removeChild(badge); }, 750);
  }

  function bumpScore() {
    const el = document.getElementById('score');
    if (!el) return;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  async function processChains() {
    let chainCount = 0;
    const prevHighestTier = highestTier;
    while (true) {
      let merged = null;
      let mergedTier = 0;
      let mergeSize = 0;
      outer: for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = grid[r][c];
          if (t === 0 || t === MAX_TIER) continue;
          const group = findGroup(r, c, t);
          if (group.length >= 2) {
            let kr = -1, kc = -1;
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr > kr || (gr === kr && gc < kc)) { kr = gr; kc = gc; }
            }
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr === kr && gc === kc) continue;
              grid[gr][gc] = 0;
            }
            const nt = Math.min(t + 1, MAX_TIER);
            grid[kr][kc] = nt;
            chainCount++;
            const multiplier = 1 + (chainCount - 1) * 0.5;
            const points = pointsFor(nt, group.length, multiplier);
            score += points;
            if (nt > highestTier) highestTier = nt;
            merged = [kr, kc];
            mergedTier = nt;
            mergeSize = group.length;
            showFloatingScore(kr, kc, points, chainCount);
            bumpScore();
            soundMerge(nt);
            if (chainCount > currentGameMaxChain) currentGameMaxChain = chainCount;
            if (chainCount >= 2) {
              const m = chainCount === 2 ? '1.5' : chainCount === 3 ? '2' : chainCount === 4 ? '2.5' : '3';
              showChainBadge(chainCount, m);
              soundChain(chainCount);
            }
            break outer;
          }
        }
      }
      if (!merged) break;
      render({ merging: merged });
      await sleep(230);
      applyGravity();
      render();
      await sleep(140);
    }
    if (highestTier > prevHighestTier) {
      soundMilestone(highestTier);
      buzz([30, 40, 30]);
    }
    checkAchievements();
  }

  function isGameOver() {
    return grid[0].every(function(c) { return c !== 0; });
  }

  async function drop(col) {
    if (busy) return;
    let row = -1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][col] === 0) { row = r; break; }
    }
    if (row === -1) return;
    busy = true;
    ensureAudio();
    playMusic('game');
    soundDrop();
    if (!streakBumpedThisSession) {
      bumpStreak();
      streakBumpedThisSession = true;
    }
    grid[row][col] = nextPiece;
    if (nextPiece > highestTier) highestTier = nextPiece;
    render({ appearing: [row, col] });
    await sleep(140);
    await processChains();
    nextPiece = pickPiece();
    if (score > best) { best = score; localStorage.setItem(BEST_KEY, String(best)); }
    if (isGameOver()) {
      soundGameOver();
      buzz([60, 80, 100]);
      playMusic('fail');
      incrementGamesPlayed();
      checkAchievements();
      if (mode === 'daily' && !dailySubmitted) {
        dailySubmitted = true;
        localStorage.setItem(DAILY_PLAYED_PREFIX + dailyDate, JSON.stringify({ score: score, tier: highestTier, ts: Date.now() }));
        render({ over: true });
        if (!playerName) {
          promptForName(function() { submitAndShowLeaderboard(); });
        } else {
          submitAndShowLeaderboard();
        }
      } else {
        render({ over: true });
      }
    }
    else { busy = false; render(); }
  }

  function shareResult() {
    const emojis = [];
    for (let t = 1; t <= highestTier; t++) emojis.push(TIERS[t].emoji);
    let header;
    if (mode === 'daily') {
      header = 'BLOOM · אתגר יומי ' + formatDateHe(dailyDate) + '\n' + score.toLocaleString() + ' נקודות';
      if (dailyRank) header += ' · מקום #' + dailyRank;
    } else {
      header = 'BLOOM — ' + score.toLocaleString() + ' נקודות';
    }
    const text = header + '\n' + emojis.join('') + '\nשחק: ' + window.location.href;
    if (navigator.share) {
      navigator.share({ text: text }).catch(function() {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        const btn = document.getElementById('share-btn');
        if (btn) {
          const orig = btn.textContent;
          btn.textContent = '✓ הועתק ללוח';
          setTimeout(function() { btn.textContent = orig; }, 1600);
        }
      });
    }
  }

  function showInfo() {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap || document.getElementById('info-modal')) return;
    const rows = [];
    for (let t = 1; t <= MAX_TIER; t++) {
      const ti = TIERS[t];
      rows.push(
        '<div class="tier-row reached" style="text-align:right;">' +
          '<div class="tier-icon-sm" style="background:' + ti.bg + ';color:' + ti.fg + '">' + ti.svg + '</div>' +
          '<div class="tier-name">' + ti.name + '</div>' +
          '<div class="tier-pts">' + pieceValue(t).toLocaleString() + ' נק׳ במיזוג זוג</div>' +
        '</div>'
      );
    }
    const modal = document.createElement('div');
    modal.id = 'info-modal';
    modal.className = 'info-modal';
    modal.innerHTML =
      '<div class="info-card">' +
        '<button class="info-close" id="info-close" aria-label="סגור">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
        '</button>' +
        '<div class="info-title">איך הניקוד עובד</div>' +
        '<div class="info-sub">דרגה × 10 × מספר הפריטים במיזוג. שרשרת מוסיפה ×1.5, ×2, ×2.5…</div>' +
        '<div class="tier-table">' + rows.join('') + '</div>' +
        '<div class="credits">' +
          'מוזיקה: שלושה טראקים של Manuel Graf (לובי, משחק, סיום), רישיון CC BY 4.0.<br>' +
          '<a href="https://manuelgraf.com" target="_blank" rel="noopener">manuelgraf.com</a>' +
        '</div>' +
      '</div>';
    wrap.appendChild(modal);
    document.getElementById('info-close').onclick = function() { modal.remove(); };
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
  }

  function render(opts) {
    opts = opts || {};
    document.getElementById('score').textContent = score.toLocaleString();
    document.getElementById('best').textContent = best.toLocaleString();
    const np = document.getElementById('next-piece');
    const npT = TIERS[nextPiece];
    np.style.background = npT.bg;
    np.style.color = npT.fg;
    np.innerHTML = npT.svg;
    document.getElementById('next-value').textContent = pieceValue(nextPiece).toLocaleString() + ' נק׳ במיזוג';
    const wrap = document.getElementById('grid-wrap');

    if (opts.over) {
      const tierRows = [];
      for (let t = 1; t <= MAX_TIER; t++) {
        const ti = TIERS[t];
        const reached = t <= highestTier;
        tierRows.push(
          '<div class="tier-row ' + (reached ? 'reached' : 'locked') + '">' +
            '<div class="tier-icon-sm" style="background:' + ti.bg + ';color:' + ti.fg + '">' + ti.svg + '</div>' +
            '<div class="tier-name">' + ti.name + '</div>' +
            '<div class="tier-pts">' + pieceValue(t).toLocaleString() + ' נק׳ למיזוג</div>' +
          '</div>'
        );
      }
      const emojis = [];
      for (let t = 1; t <= highestTier; t++) emojis.push(TIERS[t].emoji);

      let title;
      if (mode === 'daily' && opts.alreadyPlayed) title = 'סיימת את האתגר היומי';
      else if (mode === 'daily') title = 'אתגר יומי הסתיים';
      else title = 'המשחק נגמר';

      let shareHeader;
      if (mode === 'daily') {
        shareHeader = 'BLOOM · אתגר ' + formatDateHe(dailyDate) + '<br>' + score.toLocaleString() + ' נק\'';
      } else {
        shareHeader = 'BLOOM — ' + score.toLocaleString() + ' pts';
      }

      const showCountdown = mode === 'daily';
      const showLeaderboard = mode === 'daily';
      const againLabel = (mode === 'daily') ? 'שחק באימון חופשי' : 'שחק שוב';

      wrap.innerHTML =
        '<div class="overlay">' +
          '<div class="over-title">' + title + '</div>' +
          '<div class="over-score">' + score.toLocaleString() + '</div>' +
          '<div class="over-sub">הגעת ל' + TIERS[highestTier].name + ' · ' + highestTier + '/' + MAX_TIER + ' דרגות</div>' +
          (dailyRank ? '<div class="lb-rank-pill">המקום שלך היום: #' + dailyRank + '</div>' : '') +
          (showCountdown ? '<div class="countdown" id="countdown"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>אתגר חדש בעוד <span id="countdown-val">--:--:--</span></span></div>' : '') +
          (showLeaderboard ? renderLeaderboard() : '') +
          '<div class="tier-table">' + tierRows.join('') + '</div>' +
          '<div class="share-label">התוצאה לשיתוף</div>' +
          '<div class="share-card">' + shareHeader + '<br>' + emojis.join('') + '<br><br>' + (window.location.host || 'play.bloom.com') + '</div>' +
          '<button class="btn" id="share-btn">שתף תוצאה</button>' +
          '<button class="btn secondary" id="again">' + againLabel + '</button>' +
        '</div>';
      document.getElementById('again').onclick = function() {
        if (mode === 'daily') init('practice');
        else init('practice');
      };
      document.getElementById('share-btn').onclick = shareResult;
      if (showCountdown) startCountdown();
      return;
    }

    let gridEl = document.getElementById('grid');
    if (!gridEl) {
      wrap.innerHTML = '<div class="grid" id="grid"></div>';
      gridEl = document.getElementById('grid');
    } else {
      gridEl.innerHTML = '';
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (t > 0) {
          cell.classList.add('filled');
          const ti = TIERS[t];
          cell.style.background = ti.bg;
          cell.style.color = ti.fg;
          cell.innerHTML = ti.svg;
          if (opts.appearing && opts.appearing[0] === r && opts.appearing[1] === c) cell.classList.add('appearing');
          if (opts.merging && opts.merging[0] === r && opts.merging[1] === c) cell.classList.add('merging');
        }
        (function(colIdx) {
          cell.onclick = function() { drop(colIdx); };
        })(c);
        gridEl.appendChild(cell);
      }
    }
  }

  document.getElementById('reset').onclick = function() { init(); };
  document.getElementById('info').onclick = showInfo;
  document.getElementById('mute').onclick = function() { openMuteMenu('top'); };
  document.getElementById('leaderboard').onclick = openLeaderboardModal;
  document.getElementById('achievements').onclick = openAchievementsModal;
  document.getElementById('home-btn').onclick = function() { showHome(); };
  document.getElementById('mode-switch').onclick = function() {
    init(mode === 'daily' ? 'practice' : 'daily');
  };

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') pauseAllMusic();
    else if (document.visibilityState === 'visible' && !musicMuted) resumeCurrentMusic();
  });

  /* Browsers block audio until the first user interaction.
     Prime once on any pointer/touch/key event so the lobby track
     (queued by showHome) actually starts playing. */
  let audioPrimed = false;
  function primeAudio() {
    if (audioPrimed) return;
    audioPrimed = true;
    ensureAudio();
    if (currentTrack && !musicMuted) {
      const el = getTrackEl(currentTrack);
      if (el && el.paused) fadeInTrack(currentTrack, MUSIC_FADE_MS, MUSIC_VOLUME);
    }
  }
  document.addEventListener('pointerdown', primeAudio, { once: true, capture: true });
  document.addEventListener('touchstart',  primeAudio, { once: true, capture: true });
  document.addEventListener('keydown',     primeAudio, { once: true, capture: true });

  updateMuteUI();
  renderStreakBadge();
  init('daily');
  showHome();
})();
</script>
