<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BLOOM — משחק מיזוג</title>
<meta property="og:title" content="BLOOM — משחק מיזוג">
<meta property="og:description" content="מזג, התקדם, הגע לכתר. שחק עכשיו.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #F5F5F0;
    color: #1C1A18;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    justify-content: center;
    padding: 16px;
    min-height: 100vh;
    min-height: 100dvh;
  }
  .app {
    width: 100%;
    max-width: 380px;
    margin: auto;
    background: #FFFFFF;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 2px 30px rgba(0,0,0,0.06);
  }
  .top {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .brand { font-size: 16px; letter-spacing: 0.2em; font-weight: 600; color: #1C1A18; }
  .stats { display: flex; gap: 16px; align-items: center; }
  .stat-label { font-size: 10px; color: #6F6E68; letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-val { font-size: 16px; font-weight: 600; color: #1C1A18; margin-top: 1px; display: inline-block; }
  .stat-val.bump { animation: bump 0.32s ease-out; }
  @keyframes bump {
    0% { transform: scale(1); color: #1C1A18; }
    40% { transform: scale(1.22); color: #BA7517; }
    100% { transform: scale(1); color: #1C1A18; }
  }
  .top-buttons { display: flex; gap: 6px; }
  .icon-btn {
    background: none; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .icon-btn svg { width: 16px; height: 16px; color: #6F6E68; }
  .icon-btn:hover { background: #F5F5F0; }
  .icon-btn.muted svg { color: #C84040; }
  .next-bar {
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .next-label { font-size: 12px; color: #6F6E68; }
  .next-piece {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .next-piece svg { width: 24px; height: 24px; }
  .next-value { flex: 1; font-size: 11px; color: #A8A6A0; text-align: left; }
  .grid-wrap { padding: 12px; direction: ltr; position: relative; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .cell {
    aspect-ratio: 1; background: #F5F2EC; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.12s;
  }
  .cell:hover { background: #EFEBE2; }
  .cell.filled svg { width: 30px; height: 30px; }
  .cell.appearing { animation: pop 0.22s ease-out; }
  .cell.merging { animation: merge 0.24s ease-out; }
  @keyframes pop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes merge { 0% { transform: scale(1); } 50% { transform: scale(1.28); } 100% { transform: scale(1); } }

  .float-score {
    position: absolute;
    background: #1C1A18;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 12px;
    pointer-events: none;
    z-index: 20;
    white-space: nowrap;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translate(-50%, 10%) scale(0.6); }
    18%  { opacity: 1; transform: translate(-50%, -30%) scale(1.08); }
    100% { opacity: 0; transform: translate(-50%, -130%) scale(1); }
  }
  .chain-badge {
    position: absolute;
    top: 50%; left: 50%;
    background: #EF9F27;
    color: #412402;
    font-weight: 800;
    font-size: 20px;
    padding: 10px 22px;
    border-radius: 24px;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 25;
    white-space: nowrap;
    animation: chainPop 0.75s ease-out forwards;
  }
  @keyframes chainPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.55) rotate(-6deg); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.18) rotate(-2deg); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -75%) scale(0.95) rotate(0); }
  }

  .overlay { padding: 20px 22px 22px; text-align: center; direction: rtl; }
  .over-title { font-size: 13px; font-weight: 500; color: #6F6E68; letter-spacing: 0.08em; text-transform: uppercase; }
  .over-score { font-size: 42px; font-weight: 700; color: #1C1A18; margin-top: 8px; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .over-sub { font-size: 13px; color: #6F6E68; margin-top: 6px; }
  .tier-table { display: flex; flex-direction: column; gap: 4px; margin: 16px 0 4px; }
  .tier-row { display: flex; align-items: center; gap: 10px; padding: 5px 8px; border-radius: 7px; }
  .tier-row.reached { background: #FAFAF6; }
  .tier-row.locked { opacity: 0.4; }
  .tier-icon-sm { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .tier-icon-sm svg { width: 14px; height: 14px; }
  .tier-name { flex: 1; font-size: 13px; color: #1C1A18; text-align: right; }
  .tier-pts { font-size: 12px; color: #6F6E68; font-variant-numeric: tabular-nums; }

  .share-label { font-size: 10px; color: #A8A6A0; margin: 14px 0 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .share-card {
    padding: 12px 14px; background: #DCF8C6; border-radius: 10px;
    direction: ltr; text-align: left;
    font-size: 13px; line-height: 1.8; color: #1B5E20;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .btn {
    width: 100%; padding: 13px; border-radius: 10px;
    background: #1C1A18; color: #FFFFFF;
    border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-top: 14px;
  }
  .btn.secondary { background: #F5F2EC; color: #1C1A18; margin-top: 8px; }
  .btn:active { transform: scale(0.98); }

  .info-modal {
    position: fixed; inset: 0;
    background: rgba(28,26,24,0.55);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .info-card {
    background: #FFFFFF; border-radius: 16px; padding: 18px 18px 16px;
    width: 100%; max-width: 340px;
    max-height: calc(100vh - 40px);
    max-height: calc(100dvh - 40px);
    overflow-y: auto;
  }
  .info-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .info-sub { font-size: 12px; color: #6F6E68; margin-bottom: 12px; }
  .info-close { float: left; background: none; border: none; cursor: pointer; padding: 0; }
  .info-close svg { width: 18px; height: 18px; color: #6F6E68; }

  .mode-bar {
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: linear-gradient(90deg, #FFF7E6 0%, #FFFFFF 100%);
  }
  .mode-bar.practice { background: #FAFAF6; }
  .mode-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .mode-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: #EF9F27; color: #412402; flex-shrink: 0; }
  .mode-icon svg { width: 14px; height: 14px; }
  .mode-bar.practice .mode-icon { background: #D3D1C7; color: #2C2C2A; }
  .mode-text { min-width: 0; }
  .mode-title { font-size: 12px; font-weight: 600; color: #1C1A18; line-height: 1.15; }
  .mode-sub { font-size: 10px; color: #6F6E68; line-height: 1.15; margin-top: 1px; }
  .mode-switch {
    background: none; border: 1px solid rgba(0,0,0,0.12); border-radius: 14px;
    padding: 4px 10px; font-size: 11px; color: #6F6E68; cursor: pointer;
    font-family: inherit; flex-shrink: 0;
  }
  .mode-switch:hover { background: #F5F2EC; }

  .leaderboard { margin: 14px 0 4px; }
  .lb-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; color: #A8A6A0; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .lb-list { display: flex; flex-direction: column; gap: 3px; }
  .lb-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 8px; background: #FAFAF6;
    font-size: 13px;
  }
  .lb-row.you { background: #FFF1D0; }
  .lb-rank { width: 22px; font-weight: 600; color: #6F6E68; font-variant-numeric: tabular-nums; text-align: center; flex-shrink: 0; }
  .lb-row.you .lb-rank { color: #BA7517; }
  .lb-name { flex: 1; color: #1C1A18; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
  .lb-score { font-weight: 600; color: #1C1A18; font-variant-numeric: tabular-nums; }
  .lb-empty { font-size: 12px; color: #A8A6A0; text-align: center; padding: 14px 8px; }
  .lb-loading { font-size: 12px; color: #A8A6A0; text-align: center; padding: 14px 8px; }
  .lb-rank-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #FFF1D0; color: #BA7517;
    padding: 4px 10px; border-radius: 14px; font-size: 12px; font-weight: 600;
    margin-top: 8px;
  }
  .lb-tabs { display: flex; gap: 6px; margin: 6px 0 12px; }
  .lb-tab {
    flex: 1; padding: 8px 10px; border-radius: 8px;
    background: #F5F2EC; color: #6F6E68;
    border: none; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 500;
  }
  .lb-tab.active { background: #1C1A18; color: #FFFFFF; }
  .lb-range { font-size: 11px; color: #A8A6A0; margin-bottom: 8px; direction: rtl; text-align: right; }

  .countdown {
    display: inline-flex; align-items: center; gap: 6px;
    background: #F5F2EC; color: #6F6E68;
    padding: 6px 12px; border-radius: 14px;
    font-size: 12px; font-variant-numeric: tabular-nums;
    margin-top: 10px;
  }
  .countdown svg { width: 13px; height: 13px; }

  .name-modal { padding: 18px; }
  .name-input {
    width: 100%; padding: 11px 13px; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 10px; font-size: 14px; font-family: inherit;
    background: #FAFAF6; color: #1C1A18; direction: rtl;
    margin-top: 10px;
  }
  .name-input:focus { outline: none; border-color: #BA7517; background: #FFFFFF; }
</style>
</head>
<body>

<div class="app">
  <div class="top">
    <div class="brand">BLOOM</div>
    <div class="stats">
      <div><div class="stat-label">ניקוד</div><div class="stat-val" id="score">0</div></div>
      <div><div class="stat-label">שיא</div><div class="stat-val" id="best">0</div></div>
    </div>
    <div class="top-buttons">
      <button class="icon-btn" id="mute" aria-label="השתק">
        <svg id="mute-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 8a5 5 0 0 1 0 8M17.7 5a9 9 0 0 1 0 14M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15"/></svg>
      </button>
      <button class="icon-btn" id="leaderboard" aria-label="טבלת מובילים">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="14" width="5" height="7" rx="1"/><rect x="9.5" y="9" width="5" height="12" rx="1"/><rect x="16" y="4" width="5" height="17" rx="1"/></svg>
      </button>
      <button class="icon-btn" id="info" aria-label="מידע על ניקוד">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      </button>
      <button class="icon-btn" id="reset" aria-label="התחל מחדש">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11A8.1 8.1 0 0 0 4.5 9M4 5v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4"/></svg>
      </button>
    </div>
  </div>
  <div class="mode-bar" id="mode-bar">
    <div class="mode-info">
      <div class="mode-icon" id="mode-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
      </div>
      <div class="mode-text">
        <div class="mode-title" id="mode-title">אתגר יומי</div>
        <div class="mode-sub" id="mode-sub">אותו דאנג'ן לכולם היום</div>
      </div>
    </div>
    <button class="mode-switch" id="mode-switch">אימון חופשי</button>
  </div>
  <div class="next-bar">
    <div class="next-label">הבא:</div>
    <div class="next-piece" id="next-piece"></div>
    <div class="next-value" id="next-value"></div>
  </div>
  <div class="grid-wrap" id="grid-wrap"><div class="grid" id="grid"></div></div>
</div>

<script>
(function() {
  const ROWS = 6, COLS = 4;

  const SVG = {
    circle:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/></svg>',
    leaf:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21c.5-4.5 2.5-8 7-10"/><path d="M9 18c6.218 0 10.5-3.288 11-12v-2h-4.014c-9 0-11.986 4-12 9c0 1 0 3 2 5h3z"/></svg>',
    flower:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><circle cx="12" cy="5.5" r="3"/><circle cx="12" cy="18.5" r="3"/><circle cx="5.5" cy="12" r="3"/><circle cx="18.5" cy="12" r="3"/></svg>',
    flame:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a5 5 0 0 0 10 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-2 2z"/></svg>',
    bolt:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3v7h6l-8 11v-7H5l8-11z"/></svg>',
    star:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17.75l-6.172 3.245 1.179-6.873-4.993-4.867 6.9-1.002L12 1.999l3.086 6.254 6.9 1.002-4.993 4.867 1.179 6.873z"/></svg>',
    diamond: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5h12l3 5-9 11-9-11z"/><path d="M3 10h18M9 5l3 5-3 5M15 5l-3 5 3 5"/></svg>',
    crown:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l3.5 9h11l3.5-9-5 4-4-7-4 7z"/></svg>'
  };

  const TIERS = [
    null,
    { svg: SVG.circle,  bg: '#D3D1C7', fg: '#2C2C2A', name: 'אבן',    emoji: '⬜' },
    { svg: SVG.leaf,    bg: '#C0DD97', fg: '#173404', name: 'עלה',    emoji: '🟩' },
    { svg: SVG.flower,  bg: '#F4C0D1', fg: '#4B1528', name: 'פרח',    emoji: '🟧' },
    { svg: SVG.flame,   bg: '#F5C4B3', fg: '#4A1B0C', name: 'אש',     emoji: '🟥' },
    { svg: SVG.bolt,    bg: '#FAC775', fg: '#412402', name: 'ברק',    emoji: '🟨' },
    { svg: SVG.star,    bg: '#9FE1CB', fg: '#04342C', name: 'כוכב',   emoji: '🟦' },
    { svg: SVG.diamond, bg: '#B5D4F4', fg: '#042C53', name: 'יהלום',  emoji: '💎' },
    { svg: SVG.crown,   bg: '#CECBF6', fg: '#26215C', name: 'כתר',    emoji: '👑' }
  ];
  const MAX_TIER = TIERS.length - 1;
  const WEIGHTS = [0, 55, 28, 12, 5];
  const BEST_KEY = 'bloom_best_score';
  const NAME_KEY = 'bloom_player_name';
  const DEVICE_KEY = 'bloom_device_id';
  const DAILY_PLAYED_PREFIX = 'bloom_daily_';
  const MUTE_KEY = 'bloom_muted';

  // Same-origin API. When the game is served from the Express backend, this
  // works as-is. When opened from file:// the leaderboard simply won't load.
  const API_BASE = '';

  /* ============ AUDIO ============ */
  const bgMusic = document.getElementById('bg-music');
  let audioCtx = null;
  let muted = localStorage.getItem(MUTE_KEY) === '1';

  function ensureAudio() {
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function() {});
    return audioCtx;
  }
  function startMusic() { if (muted || !bgMusic) return; try { bgMusic.volume = 0.35; bgMusic.play().catch(function() {}); } catch(e) {} }
  function stopMusic() { if (bgMusic) try { bgMusic.pause(); } catch(e) {} }
  function playTone(freq, duration, type, volume, delay) {
    if (muted) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    const t0 = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(volume, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + duration + 0.05);
  }
  function soundDrop() { playTone(180, 0.08, 'sine', 0.08, 0); }
  function soundMerge(tier) {
    const base = 180 + tier * 30;
    playTone(base, 0.09, 'triangle', 0.12, 0);
    playTone(base * 1.5, 0.11, 'triangle', 0.09, 0.04);
  }
  function soundChain(chainCount) {
    const notes = [262, 330, 392, 523, 659, 784];
    for (let i = 0; i < Math.min(chainCount, notes.length); i++) playTone(notes[i], 0.13, 'square', 0.08, i * 0.05);
  }
  function soundMilestone(tier) {
    const melody = [523, 659, 784, 1047];
    for (let i = 0; i < melody.length; i++) playTone(melody[i], 0.18, 'triangle', 0.13, i * 0.08);
    if (tier >= MAX_TIER) for (let i = 0; i < melody.length; i++) playTone(melody[i] * 1.5, 0.22, 'triangle', 0.1, 0.4 + i * 0.08);
  }
  function soundGameOver() {
    playTone(330, 0.15, 'sawtooth', 0.1, 0);
    playTone(247, 0.18, 'sawtooth', 0.1, 0.12);
    playTone(196, 0.32, 'sawtooth', 0.1, 0.28);
  }
  function buzz(pattern) {
    if (muted) return;
    if (navigator.vibrate) try { navigator.vibrate(pattern); } catch(e) {}
  }
  function updateMuteUI() {
    const btn = document.getElementById('mute');
    const icon = document.getElementById('mute-icon');
    if (!btn || !icon) return;
    if (muted) {
      btn.classList.add('muted');
      icon.innerHTML = '<path d="M15 8a5 5 0 0 1 1.7 3M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15M21 9l-6 6M15 9l6 6"/>';
    } else {
      btn.classList.remove('muted');
      icon.innerHTML = '<path d="M15 8a5 5 0 0 1 0 8M17.7 5a9 9 0 0 1 0 14M6 15H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2l3.5-4.5A.8.8 0 0 1 11 5v14a.8.8 0 0 1-1.5.5L6 15"/>';
    }
  }
  function toggleMute() {
    muted = !muted;
    localStorage.setItem(MUTE_KEY, muted ? '1' : '0');
    updateMuteUI();
    if (muted) stopMusic();
    else { ensureAudio(); playTone(523, 0.08, 'sine', 0.12, 0); startMusic(); }
  }

  function pointsFor(tier, groupSize, chainMult) {
    return Math.round(tier * 10 * groupSize * chainMult);
  }
  function pieceValue(tier) {
    return pointsFor(tier, 2, 1);
  }

  function mulberry32(seed) {
    let s = seed >>> 0;
    return function() {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function hashSeed(str) {
    let h = 2166136261 >>> 0;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function todayInIsrael() {
    try {
      return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Jerusalem' }).format(new Date());
    } catch (e) {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
  }
  function formatDateHe(iso) {
    const parts = iso.split('-');
    return parts[2] + '.' + parts[1] + '.' + parts[0];
  }
  function msUntilNextIsraelMidnight() {
    const now = new Date();
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Jerusalem', hour12: false,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const parts = fmt.formatToParts(now).reduce(function(o,p){ o[p.type]=p.value; return o; }, {});
    const h = parseInt(parts.hour,10), m = parseInt(parts.minute,10), s = parseInt(parts.second,10);
    const elapsed = (h * 3600 + m * 60 + s) * 1000;
    return 24*3600*1000 - elapsed;
  }
  function formatCountdown(ms) {
    const total = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(total/3600);
    const m = Math.floor((total%3600)/60);
    const s = total%60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  let grid, score, nextPiece, busy, highestTier;
  let mode = 'daily';
  let dailyDate = todayInIsrael();
  let rng = Math.random;
  let dailySubmitted = false;
  let dailyRank = null;
  let leaderboard = [];
  let leaderboardLoading = false;
  let countdownTimer = null;
  let best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
  let playerName = localStorage.getItem(NAME_KEY) || '';

  function getDeviceId() {
    let id = localStorage.getItem(DEVICE_KEY);
    if (!id) {
      if (window.crypto && crypto.randomUUID) id = crypto.randomUUID();
      else id = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem(DEVICE_KEY, id);
    }
    return id;
  }
  const deviceId = getDeviceId();

  function init(nextMode) {
    if (nextMode) mode = nextMode;
    dailyDate = todayInIsrael();
    grid = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    score = 0; highestTier = 1; busy = false;
    leaderboard = [];
    dailyRank = null;
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

    if (mode === 'daily') {
      const seed = hashSeed('bloom-' + dailyDate);
      rng = mulberry32(seed);
      const priorRaw = localStorage.getItem(DAILY_PLAYED_PREFIX + dailyDate);
      if (priorRaw) {
        dailySubmitted = true;
        try {
          const prior = JSON.parse(priorRaw);
          score = prior.score || 0;
          highestTier = prior.tier || 1;
        } catch (e) {}
        nextPiece = pickPiece();
        updateModeBar();
        render({ over: true, alreadyPlayed: true });
        loadLeaderboard();
        return;
      }

  function startCountdown() {
    function tick() {
      const el = document.getElementById('countdown-val');
      if (!el) { if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; } return; }
      const remaining = msUntilNextIsraelMidnight();
      el.textContent = formatCountdown(remaining);
      if (remaining <= 0) {
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        init('daily');
      }

    if (countdownTimer) clearInterval(countdownTimer);
    tick();

  function pickPiece() {
    const total = WEIGHTS.reduce(function(a,b) { return a+b; }, 0);
    let r = rng() * total;
    for (let i = 1; i < WEIGHTS.length; i++) {
      r -= WEIGHTS[i];
      if (r <= 0) return i;
    }
    return 1;
  }

  function findGroup(sr, sc, tier) {
    const visited = new Set();
    const group = [];
    const stack = [[sr, sc]];
    while (stack.length) {
      const pos = stack.pop();
      const r = pos[0], c = pos[1];
      const k = r * COLS + c;
      if (visited.has(k)) continue;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      if (grid[r][c] !== tier) continue;
      visited.add(k);
      group.push([r, c]);
      stack.push([r-1,c], [r+1,c], [r,c-1], [r,c+1]);
    }
    return group;
  }

  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let w = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] !== 0) {
          if (r !== w) { grid[w][c] = grid[r][c]; grid[r][c] = 0; }
          w--;
        }
      }
    }
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function showFloatingScore(row, col, points, chainCount) {
    const gridEl = document.getElementById('grid');
    if (!gridEl) return;
    const cellIdx = row * COLS + col;
    const cell = gridEl.children[cellIdx];
    if (!cell) return;
    const cellRect = cell.getBoundingClientRect();
    const wrapRect = document.getElementById('grid-wrap').getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'float-score';
    fl.textContent = '+' + points.toLocaleString();
    if (chainCount >= 3) { fl.style.fontSize = '17px'; fl.style.background = '#EF9F27'; fl.style.color = '#412402'; }
    else if (chainCount >= 2) { fl.style.fontSize = '15px'; }
    fl.style.left = (cellRect.left - wrapRect.left + cellRect.width / 2) + 'px';
    fl.style.top = (cellRect.top - wrapRect.top + cellRect.height / 2) + 'px';
    document.getElementById('grid-wrap').appendChild(fl);
    setTimeout(function() { if (fl.parentNode) fl.parentNode.removeChild(fl); }, 900);
  }

  function showChainBadge(chainCount, multiplier) {
    const wrap = document.getElementById('grid-wrap');
    if (!wrap) return;
    const badge = document.createElement('div');
    badge.className = 'chain-badge';
    badge.textContent = 'שרשרת ×' + multiplier;

  function bumpScore() {
    const el = document.getElementById('score');
    if (!el) return;
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }

  async function processChains() {
    let chainCount = 0;
    const prevHighestTier = highestTier;
    while (true) {
      let merged = null;
      let mergedTier = 0;
      let mergeSize = 0;
      outer: for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = grid[r][c];
          if (t === 0 || t === MAX_TIER) continue;
          const group = findGroup(r, c, t);
          if (group.length >= 2) {
            let kr = -1, kc = -1;
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr > kr || (gr === kr && gc < kc)) { kr = gr; kc = gc; }
            }
            for (let i = 0; i < group.length; i++) {
              const gr = group[i][0], gc = group[i][1];
              if (gr === kr && gc === kc) continue;
              grid[gr][gc] = 0;
            }
            const nt = Math.min(t + 1, MAX_TIER);
            grid[kr][kc] = nt;
            chainCount++;
            const multiplier = 1 + (chainCount - 1) * 0.5;
            const points = pointsFor(nt, group.length, multiplier);
            score += points;
            if (nt > highestTier) highestTier = nt;
            merged = [kr, kc];
            mergedTier = nt;
            mergeSize = group.length;
            showFloatingScore(kr, kc, points, chainCount);
            bumpScore();
            soundMerge(nt);
            if (chainCount >= 2) {
              const m = chainCount === 2 ? '1.5' : chainCount === 3 ? '2' : chainCount === 4 ? '2.5' : '3';
              showChainBadge(chainCount, m);
              soundChain(chainCount);
            }
            break outer;
          }
        }
      }
      if (!merged) break;
      render({ merging: merged });
      await sleep(230);
      applyGravity();
      render();
      await sleep(140);
    }
    if (highestTier > prevHighestTier) {
      soundMilestone(highestTier);
      buzz([30, 40, 30]);
    }
  }

  function isGameOver() {
    return grid[0].every(function(c) { return c !== 0; });
  }

  async function drop(col) {
    if (busy) return;
    let row = -1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][col] === 0) { row = r; break; }
    }
    if (row === -1) return;
    busy = true;
    ensureAudio();
    startMusic();
    soundDrop();
    grid[row][col] = nextPiece;
    if (nextPiece > highestTier) highestTier = nextPiece;
    render({ appearing: [row, col] });
    await sleep(140);
    await processChains();
    nextPiece = pickPiece();
    if (score > best) { best = score; localStorage.setItem(BEST_KEY, String(best)); }
    if (isGameOver()) {
      soundGameOver();
      buzz([60, 80, 100]);
      if (mode === 'daily' && !dailySubmitted) {
        dailySubmitted = true;
        localStorage.setItem(DAILY_PLAYED_PREFIX + dailyDate, JSON.stringify({ score: score, tier: highestTier, ts: Date.now() }));
        render({ over: true });
        if (!playerName) {
          promptForName(function() { submitAndShowLeaderboard(); });
        } else {
          submitAndShowLeaderboard();
        }
      } else {
        render({ over: true });
      }
    }
    else { busy = false; render(); }
  }

          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>' +
        '</button>' +
        '<div class="info-title">איך הניקוד עובד</div>' +
        '<div class="info-sub">דרגה × 10 × מספר הפריטים במיזוג. שרשרת מוסיפה ×1.5, ×2, ×2.5…</div>' +
        '<div class="tier-table">' + rows.join('') + '</div>' +
      '</div>';
    wrap.appendChild(modal);
    document.getElementById('info-close').onclick = function() { modal.remove(); };
    modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
  }

  function render(opts) {
    opts = opts || {};
    document.getElementById('score').textContent = score.toLocaleString();
    document.getElementById('best').textContent = best.toLocaleString();
    const np = document.getElementById('next-piece');
    const npT = TIERS[nextPiece];
    np.style.background = npT.bg;
    np.style.color = npT.fg;
    np.innerHTML = npT.svg;
    document.getElementById('next-value').textContent = pieceValue(nextPiece).toLocaleString() + ' נק׳ במיזוג';
    const wrap = document.getElementById('grid-wrap');

    if (opts.over) {
      const tierRows = [];
      for (let t = 1; t <= MAX_TIER; t++) {
        const ti = TIERS[t];
        const reached = t <= highestTier;
        tierRows.push(
          '<div class="tier-row ' + (reached ? 'reached' : 'locked') + '">' +
            '<div class="tier-icon-sm" style="background:' + ti.bg + ';color:' + ti.fg + '">' + ti.svg + '</div>' +
            '<div class="tier-name">' + ti.name + '</div>' +
            '<div class="tier-pts">' + pieceValue(t).toLocaleString() + ' נק׳ למיזוג</div>' +
          '</div>'
        );
      }
      const emojis = [];
      for (let t = 1; t <= highestTier; t++) emojis.push(TIERS[t].emoji);

      let title;
      if (mode === 'daily' && opts.alreadyPlayed) title = 'סיימת את האתגר היומי';
      else if (mode === 'daily') title = 'אתגר יומי הסתיים';
      else title = 'המשחק נגמר';

      let shareHeader;
      if (mode === 'daily') {
        shareHeader = 'BLOOM · אתגר ' + formatDateHe(dailyDate) + '<br>' + score.toLocaleString() + ' נק\'';
      } else {
        shareHeader = 'BLOOM — ' + score.toLocaleString() + ' pts';
      }

      const showCountdown = mode === 'daily';
      const showLeaderboard = mode === 'daily';
      const againLabel = (mode === 'daily') ? 'שחק באימון חופשי' : 'שחק שוב';

      wrap.innerHTML =
        '<div class="overlay">' +
          '<div class="over-title">' + title + '</div>' +
          '<div class="over-score">' + score.toLocaleString() + '</div>' +
          '<div class="over-sub">הגעת ל' + TIERS[highestTier].name + ' · ' + highestTier + '/' + MAX_TIER + ' דרגות</div>' +
          (dailyRank ? '<div class="lb-rank-pill">המקום שלך היום: #' + dailyRank + '</div>' : '') +
          (showCountdown ? '<div class="countdown" id="countdown"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span>אתגר חדש בעוד <span id="countdown-val">--:--:--</span></span></div>' : '') +
          (showLeaderboard ? renderLeaderboard() : '') +
          '<div class="tier-table">' + tierRows.join('') + '</div>' +
          '<div class="share-label">התוצאה לשיתוף</div>' +
          '<div class="share-card">' + shareHeader + '<br>' + emojis.join('') + '<br><br>' + (window.location.host || 'play.bloom.com') + '</div>' +
          '<button class="btn" id="share-btn">שתף תוצאה</button>' +
          '<button class="btn secondary" id="again">' + againLabel + '</button>' +
        '</div>';
      document.getElementById('again').onclick = function() {
        if (mode === 'daily') init('practice');
        else init('practice');
      };
      document.getElementById('share-btn').onclick = shareResult;
      if (showCountdown) startCountdown();
      return;
    }

    let gridEl = document.getElementById('grid');
    if (!gridEl) {
      wrap.innerHTML = '<div class="grid" id="grid"></div>';
      gridEl = document.getElementById('grid');
    } else {
      gridEl.innerHTML = '';
    }
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (t > 0) {
          cell.classList.add('filled');
          const ti = TIERS[t];
          cell.style.background = ti.bg;
          cell.style.color = ti.fg;
          cell.innerHTML = ti.svg;
          if (opts.appearing && opts.appearing[0] === r && opts.appearing[1] === c) cell.classList.add('appearing');
          if (opts.merging && opts.merging[0] === r && opts.merging[1] === c) cell.classList.add('merging');
        }
        (function(colIdx) {
          cell.onclick = function() { drop(colIdx); };
        })(c);
        gridEl.appendChild(cell);
      }
    }
  }

  document.getElementById('reset').onclick = function() { init(); };
  document.getElementById('info').onclick = showInfo;
  document.getElementById('mute').onclick = toggleMute;
  document.getElementById('leaderboard').onclick = openLeaderboardModal;
  document.getElementById('mode-switch').onclick = function() {
    init(mode === 'daily' ? 'practice' : 'daily');
  };

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'hidden') stopMusic();
    else if (document.visibilityState === 'visible' && !muted) startMusic();
  });

  updateMuteUI();
  init('daily');
})();
</script>

</body>
</html>
